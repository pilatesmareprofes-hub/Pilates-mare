<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#f5e6e8"/>
<title>Pilates Mare</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:linear-gradient(135deg,#fdf6f0,#f5e6e8,#e8f0f5);min-height:100vh;color:#3a2a3a}
#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;color:#9a7080}
.hdr{background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,180,180,0.3);padding:12px 20px;position:sticky;top:0;z-index:100;display:none;align-items:center;justify-content:space-between}
.wrap{max-width:600px;margin:0 auto;padding:16px;display:none}
.card{background:rgba(255,255,255,0.82);border:1px solid rgba(200,180,180,0.2);border-radius:16px;padding:16px;margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.bigbtn{border:none;border-radius:18px;padding:24px 16px;cursor:pointer;text-align:left;color:white;width:100%;transition:transform 0.15s;font-family:Georgia,serif}
.bigbtn:active{transform:scale(0.97)}
input,select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(200,180,180,0.3);background:rgba(255,255,255,0.9);font-size:14px;font-family:Georgia,serif;color:#5a3a4a;outline:none;margin-bottom:8px}
label{display:block;font-size:11px;color:#9a7080;letter-spacing:1px;margin-bottom:5px;margin-top:6px}
.pbtn{width:100%;padding:14px;color:white;border:none;border-radius:14px;font-size:15px;font-family:Georgia,serif;cursor:pointer;margin-top:6px}
.bbtn{background:none;border:none;color:#9a7080;cursor:pointer;font-size:13px;margin-bottom:16px;padding:0;font-family:Georgia,serif}
.badge{padding:3px 10px;border-radius:16px;font-size:11px}
.bg{background:#7aab8a;color:white}
.bo{background:rgba(122,171,138,0.15);color:#5a8a6a;border:1px solid rgba(122,171,138,0.3)}
.br{background:rgba(200,100,100,0.1);color:#c06060;border:1px solid rgba(200,100,100,0.2)}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:6px 12px;border-radius:16px;border:1px solid rgba(200,180,180,0.3);font-size:12px;cursor:pointer;font-family:Georgia,serif;background:rgba(255,255,255,0.7);color:#7a5a6a}
.tab.on{color:white}
.notif{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:24px;color:white;font-size:13px;font-family:Georgia,serif;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.15);display:none}
.row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.82);border-radius:12px;padding:10px 12px;border:1px solid rgba(200,180,180,0.2);margin-bottom:6px}
.itag{padding:3px 10px;border-radius:16px;font-size:11px;cursor:pointer;font-family:Georgia,serif;margin:2px;border:1px solid rgba(200,180,180,0.3);background:rgba(240,240,240,0.5);color:#9a8090;display:inline-block}
.itag.on{background:rgba(212,128,154,0.15);color:#b0506a;border-color:#d4809a}
.clsbtn{width:100%;padding:12px 14px;margin-bottom:7px;border-radius:12px;border:1px solid rgba(200,180,180,0.3);background:rgba(255,255,255,0.8);color:#5a3a4a;cursor:pointer;text-align:left;font-family:Georgia,serif;display:flex;justify-content:space-between;align-items:center}
.clsbtn.sel{border:2px solid #d4809a;background:rgba(212,128,154,0.1)}
.clsbtn.dis{background:#f0f0f0;color:#aaa;cursor:default}
.jbtn{width:100%;padding:14px;margin-bottom:8px;border-radius:12px;border:1px solid rgba(180,200,220,0.4);background:rgba(255,255,255,0.8);cursor:pointer;text-align:left;font-family:Georgia,serif;display:flex;justify-content:space-between;align-items:center}
.jbtn.sel{border:2px solid #8ab8d8;background:rgba(138,184,216,0.1)}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mbox{background:#fff;border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto}
.smb{padding:7px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:Georgia,serif;border:none;color:white}
</style>
</head>

function fix(v,d){
  if(!v) return d||[];
  if(Array.isArray(v)) return v.filter(Boolean);
  return Object.values(v).filter(Boolean);
}

Promise.all([
  db.ref('v3/classes').once('value').then(s=>{
    const v=fix(s.val(),DC);
    classes=v.map(c=>({...c,enrolled:Array.isArray(c.enrolled)?c.enrolled:[]}));
  }),
  db.ref('v3/students').once('value').then(s=>{students=fix(s.val(),DS);}),
  db.ref('v3/absences').once('value').then(s=>{absences=fix(s.val(),[]);}),
  db.ref('v3/payments').once('value').then(s=>{payments=fix(s.val(),[]);})

// Payment helpers
function getPay(name){return payments.find(p=>p.name===name);}
function payStatus(name){
  const p=getPay(name);
  if(!p||!p.dueDate) return 'none';
  const d=Math.ceil((new Date(p.dueDate)-Date.now())/(864e5));
  if(d<0) return 'overdue';
  if(d<=5) return 'warning';
  return 'ok';
}
function daysLeft(name){
  const p=getPay(name);
  if(!p||!p.dueDate) return null;
  return Math.ceil((new Date(p.dueDate)-Date.now())/(864e5));
}

// Student helpers
function enroll(name,freq,time){
  const days=freq==='3'?['Lunes','Miércoles','Viernes']:['Martes','Jueves'];
  classes=classes.map(c=>{
    if(days.includes(c.day)&&c.time===time&&!c.enrolled.includes(name))
      return{...c,enrolled:[...c.enrolled,name]};
    return c;
  });
}
function unenroll(name){
  classes=classes.map(c=>({...c,enrolled:c.enrolled.filter(e=>e!==name)}));
}

function nextMonth(dateStr){
  const d=new Date(dateStr);
  d.setMonth(d.getMonth()+1);
  return d.toISOString().split('T')[0];
}
function autoSetDue(){
  const paid=document.getElementById('e-paid').value;
  if(paid) document.getElementById('e-due').value=nextMonth(paid);
}
function toggleBaja(idx){
  students[idx].active=!students[idx].active;
  if(!students[idx].active) unenroll(students[idx].name);
  saveS();saveC();closeModal();
  notif(students[idx].active?'✓ Alumna reactivada':'Alumna dada de baja (datos conservados)');
  render();
}
function saveSt(idx){
  const name=document.getElementById('e-name').value.trim();
  const phone=document.getElementById('e-phone').value.trim();
  const freq=document.getElementById('e-freq').value;
  const time=document.getElementById('e-time').value;
  const birthdate=document.getElementById('e-birth')?document.getElementById('e-birth').value:'';
  const dni=document.getElementById('e-dni')?document.getElementById('e-dni').value.trim():'';
  const profession=document.getElementById('e-prof')?document.getElementById('e-prof').value.trim():'';
  const emergency=document.getElementById('e-emerg')?document.getElementById('e-emerg').value.trim():'';
  const notes=document.getElementById('e-notes')?document.getElementById('e-notes').value.trim():'';
  const paidDate=document.getElementById('e-paid')?document.getElementById('e-paid').value:'';
  const dueDate=document.getElementById('e-due')?document.getElementById('e-due').value:'';
  if(!name) return notif('Escribí el nombre','error');
  const isNew=idx===-1;
  const oldName=isNew?null:students[idx].name;
  const oldActive=isNew?true:(students[idx].active!==false);
  if(isNew&&students.find(s=>s.name===name)) return notif('Esa alumna ya existe','error');
  if(!isNew) unenroll(oldName);
  if(freq&&time&&oldActive) enroll(name,freq,time);
  const st={name,phone,freq,time,active:oldActive,birthdate,dni,profession,emergency,notes};
  if(isNew) students=[...students,st].sort((a,b)=>a.name.localeCompare(b.name));
  else{
    students=students.map((s,i)=>i===idx?st:s);
    absences=absences.map(a=>a.studentName===oldName?{...a,studentName:name}:a);
    payments=payments.map(p=>p.name===oldName?{...p,name}:p);
    saveA();
  }
  // Save payment if dates provided
  if(paidDate&&dueDate){
    payments=payments.filter(p=>p.name!==name);
    payments.push({name,paidDate,dueDate});
    saveP();
  }
  saveS();saveC();closeModal();
  notif('✓ '+(isNew?'Alumna agregada':'Cambios guardados'));render();
}
function delSt(idx){
  if(!confirm('¿Eliminar a '+students[idx].name+'?')) return;
  const name=students[idx].name;
  unenroll(name);
  students=students.filter((_,i)=>i!==idx);
  absences=absences.filter(a=>a.studentName!==name);
  payments=payments.filter(p=>p.name!==name);
  saveS();saveC();saveA();saveP();
  closeModal();notif('Alumna eliminada');render();
}

// Confirm absence
function confirmAbsence(){
  if(!selClass||!selStudent) return notif('Completá todos los campos','error');
  const cls=classes.find(c=>c.id==selClass);
  if(!cls.enrolled.includes(selStudent)) return notif('No estás inscripta en esa clase','error');
  if(absences.find(a=>a.classId==selClass&&a.studentName===selStudent)) return notif('Ya avisaste tu falta','error');
  absences=[...absences,{classId:selClass,studentName:selStudent}];
  saveA();
  notif('¡Listo! Tu lugar quedó disponible 🌸');
  const phone=TEACHERS[cls.teacher];
  const msg='🌸 *Pilates Mare*\n\nHola '+cls.teacher+'! Te aviso que *'+selStudent+'* no va a poder ir a tu clase del *'+cls.day+' a las '+cls.time+'hs*.\n\nSu lugar quedó disponible. 🧘‍♀️';
  openWA(phone,msg);
  showView('home');
}
// Confirm join
function confirmJoin(){
  const name=joinSt||joinName.trim();
  if(!selClass||!name) return notif('Completá todos los campos','error');
  const cls=classes.find(c=>c.id==selClass);
  if(free(cls)<=0) return notif('No hay lugares disponibles','error');
  if(cls.enrolled.includes(name)) return notif('Ya estás inscripta','error');
  classes=classes.map(c=>c.id==selClass?{...c,enrolled:[...c.enrolled,name]}:c);
  const rm=absences.find(a=>a.classId==selClass);
  if(rm) absences=absences.filter(a=>!(a.classId==selClass&&a.studentName===rm.studentName));
  saveC();saveA();
  notif('¡Genial! Te sumaste 🎉');
  const phone=TEACHERS[cls.teacher];
  const msg='🌸 *Pilates Mare*\n\nHola '+cls.teacher+'! *'+name+'* se anotó en tu clase del *'+cls.day+' a las '+cls.time+'hs*. 🧘‍♀️';
  openWA(phone,msg);
  showView('home');
}

  });
  h+='</div>';
  if(!dayCls.length) h+='<div style="text-align:center;color:#bbb;font-size:14px;padding:24px">No hay clases este día</div>';
  dayCls.forEach(c=>{
    const f=free(c);
    h+='<div class="card" style="border-left:4px solid '+DAY_COLORS[schedDay]+'">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center">';
    h+='<div><div style="font-size:17px;font-weight:bold;color:#5a3a4a">'+c.time+'hs</div><div style="font-size:12px;color:#9a7080;margin-top:2px">👩‍🏫 '+c.teacher+'</div><div style="font-size:11px;color:#b09080;margin-top:1px">'+c.enrolled.length+'/'+c.spots+' inscriptas</div></div>';
    h+='<span class="badge '+(f>0?'bo':'br')+'">'+(f>0?f+' libre'+(f>1?'s':''):'Completa')+'</span>';
    h+='</div></div>';
  });
  return h;
}

function rAbsence(){
  let h='<button class="bbtn" onclick="showView(\'home\')">← Volver</button>';
  h+='<div style="font-size:22px;font-weight:bold;color:#7a4a5a;margin-bottom:6px">🙋‍♀️ Aviso que falto</div>';
  h+='<div style="font-size:13px;color:#9a7080;margin-bottom:20px">Tu lugar quedará disponible para otra alumna.</div>';
  h+='<label>¿Cuál es tu nombre?</label>';
  h+='<select onchange="selStudent=this.value;render()"><option value="">Seleccioná tu nombre...</option>';
  students.forEach(s=>{ h+='<option value="'+s.name+'"'+(s.name===selStudent?' selected':'')+'>'+s.name+'</option>'; });
  h+='</select>';
  if(selStudent){
    h+='<label style="margin-top:8px">¿A qué clase no vas a ir?</label>';
    ALL_DAYS.forEach(day=>{
      const dc=classes.filter(c=>c.day===day&&c.enrolled.includes(selStudent));
      if(!dc.length) return;
      h+='<div style="font-size:10px;color:#a07080;letter-spacing:1px;margin:10px 0 5px">'+day.toUpperCase()+'</div>';
      dc.forEach(c=>{
        const isSel=selClass==c.id;
        const already=absences.find(a=>a.classId==c.id&&a.studentName===selStudent);
        h+='<button class="clsbtn'+(isSel?' sel':'')+(already?' dis':'')+'" onclick="'+(already?'':'selClass='+c.id+';render()')+'">';
        h+='<span>'+c.time+'hs <span style="font-size:11px;color:#b09080">· '+c.teacher+'</span></span>';
        h+=already?'<span style="font-size:11px;color:#aaa">ya avisaste ✓</span>':(isSel?'<span style="color:#d4809a">✓</span>':'');
        h+='</button>';
      });
    });
    if(!classes.some(c=>c.enrolled.includes(selStudent)))
      h+='<div style="color:#aaa;font-size:13px;text-align:center;padding:16px">No estás inscripta en ninguna clase</div>';
  }
  h+='<button class="pbtn" style="background:linear-gradient(135deg,#d4809a,#e0a0b5)" onclick="confirmAbsence()">Confirmar y avisar por WhatsApp 📲</button>';
  h+='<div style="text-align:center;font-size:11px;color:#b09098;margin-top:8px">Se abre WhatsApp con un mensaje listo para la profe</div>';
  return h;
}

function rJoin(){
  const avail=classes.filter(c=>free(c)>0);
  let h='<button class="bbtn" onclick="showView(\'home\')">← Volver</button>';
  h+='<div style="font-size:22px;font-weight:bold;color:#4a5a7a;margin-bottom:6px">🧘‍♀️ Quiero un lugar</div>';
  h+='<div style="font-size:13px;color:#9a7080;margin-bottom:20px">Clases con lugares disponibles.</div>';
  h+='<label>¿Cuál es tu nombre?</label>';
  h+='<select onchange="joinSt=this.value;joinName=\'\';render()"><option value="">Seleccioná tu nombre...</option>';
  students.forEach(s=>{ h+='<option value="'+s.name+'"'+(s.name===joinSt?' selected':'')+'>'+s.name+'</option>'; });
  h+='</select>';
  if(!joinSt) h+='<input type="text" placeholder="O escribí tu nombre si es tu primera vez..." value="'+joinName+'" oninput="joinName=this.value">';
  h+='<label style="margin-top:6px">¿A qué clase querés sumarte?</label>';
  if(!avail.length) h+='<div class="card" style="text-align:center;color:#aaa;font-size:13px">No hay lugares disponibles.<br><span style="font-size:11px">Revisá más tarde 🌸</span></div>';
  avail.forEach(c=>{
    const f=free(c);const isSel=selClass==c.id;
    h+='<button class="jbtn'+(isSel?' sel':'')+'" onclick="selClass='+(isSel?'null':c.id)+';render()">';
    h+='<div><div style="font-size:14px;font-weight:bold;color:#3a4a6a">'+c.day+' — '+c.time+'hs</div><div style="font-size:11px;color:#8090a0;margin-top:2px">👩‍🏫 '+c.teacher+' · '+c.enrolled.length+' de '+c.spots+'</div></div>';
    h+='<span class="badge bg">'+f+' libre'+(f>1?'s':'')+'</span></button>';
  });
  h+='<button class="pbtn" style="background:linear-gradient(135deg,#8ab8d8,#a5c8e8)" onclick="confirmJoin()">Confirmar mi lugar 📲</button>';
  return h;
}

function rAdmin(){
  let h='<button class="bbtn" onclick="showView(\'home\')">← Volver</button>';
  h+='<div style="font-size:20px;font-weight:bold;color:#5a4a3a;margin-bottom:16px">⚙ Panel Admin</div>';
  h+='<div class="tabs" style="border-bottom:1px solid rgba(200,180,180,0.3);padding-bottom:10px;margin-bottom:16px">';
  [['alumnas','👩‍🎓 Alumnas'],['pagos','💰 Pagos'],['clases','📅 Horarios'],['ausencias','🙋 Ausencias'],['profes','👩‍🏫 Profes']].forEach(([k,l])=>{
    h+='<button class="tab'+(adminTab===k?' on':'')+'" style="'+(adminTab===k?'background:#d4809a;':'')+'" onclick="adminTab=\''+k+'\';render()">'+l+'</button>';
  });
  h+='</div>';
  if(adminTab==='alumnas') h+=rAdminAlumnas();
  else if(adminTab==='pagos') h+=rAdminPagos();
  else if(adminTab==='clases') h+=rAdminClases();
  else if(adminTab==='ausencias') h+=rAdminAusencias();
  else if(adminTab==='profes') h+=rAdminProfes();
  return h;
}

function rAdminAlumnas(){
  const activeList=students.filter(s=>s.active!==false);
  const bajaList=students.filter(s=>s.active===false);
  let h='<div style="font-size:11px;color:#9a7080;letter-spacing:1.5px;margin-bottom:12px;font-weight:bold">👩‍🎓 ALUMNAS — '+activeList.length+' activas · '+bajaList.length+' bajas</div>';
  h+='<button onclick="openEditSt(-1)" style="width:100%;padding:12px;background:linear-gradient(135deg,#7aab8a,#5a9a7a);border:none;color:white;border-radius:12px;font-size:14px;cursor:pointer;font-family:Georgia,serif;margin-bottom:16px">+ Agregar nueva alumna</button>';
  // Show active first, then bajas collapsed
  const showBajas=window._showBajas||false;
  const listToShow=showBajas?students:activeList;
  if(bajaList.length>0){
    h+='<button onclick="window._showBajas=!window._showBajas;render()" style="width:100%;padding:8px;background:none;border:1px solid rgba(200,180,180,0.4);color:#9a7080;border-radius:10px;font-size:12px;cursor:pointer;font-family:Georgia,serif;margin-bottom:12px">'+(showBajas?'Ocultar bajas':'Ver bajas ('+bajaList.length+')')+'</button>';
  }
  listToShow.forEach((s,i)=>{
    const idx=students.indexOf(s);
    const st=payStatus(s.name);
    const isBaja=s.active===false;
    const bc=isBaja?'#bbb':st==='overdue'?'#e57373':st==='warning'?'#ffb74d':st==='ok'?'#a5d4b4':'#ddd';
    const myCls=classes.filter(c=>c.enrolled.includes(s.name));
    const days=[...new Set(myCls.map(c=>c.day))];
    const freq=days.includes('Lunes')?'L/M/V':days.includes('Martes')?'Mar/Jue':null;
    const time=myCls.length>0?myCls[0].time:null;
    h+='<div class="card" style="margin-bottom:8px;border-left:4px solid '+bc+';padding:12px;'+(isBaja?'opacity:0.65;':'')+'">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start">';
    h+='<div style="flex:1">';
    h+='<div style="font-size:15px;font-weight:bold;color:#5a3a4a">'+s.name+(isBaja?' <span style="font-size:10px;background:#eee;color:#999;padding:2px 6px;border-radius:8px">BAJA</span>':'')+'</div>';
    if(freq&&time) h+='<div style="font-size:12px;color:#9a7080;margin-top:2px">'+freq+' · '+time+'hs</div>';
    else h+='<div style="font-size:12px;color:#c09080;margin-top:2px">sin horario asignado</div>';
    if(s.phone) h+='<div style="font-size:12px;color:#9a7080;margin-top:1px">📱 '+s.phone+'</div>';
    if(s.birthdate) h+='<div style="font-size:11px;color:#b09080;margin-top:1px">🎂 '+s.birthdate+'</div>';
    if(s.notes) h+='<div style="font-size:11px;color:#9a8070;margin-top:1px;font-style:italic">📝 '+s.notes+'</div>';
    if(!isBaja){
      const p=getPay(s.name);
      if(p){const dl=daysLeft(s.name);const col=dl<0?'#e57373':dl<=5?'#e59040':'#7aab8a';
        h+='<div style="font-size:11px;color:'+col+';margin-top:2px">'+(dl<0?'❗ Vencido ('+Math.abs(dl)+'d)':dl<=5?'⚠️ Vence en '+dl+'d':'✓ Vence '+p.dueDate)+'</div>';
      } else h+='<div style="font-size:11px;color:#e57373;margin-top:2px">❗ Sin pago registrado</div>';
    }
    h+='</div>';
    h+='<div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">';
    h+='<button onclick="openEditSt('+idx+')" class="smb" style="background:#9a8090">✏️ Editar</button>';
    if(s.phone&&!isBaja) h+='<button onclick="openWA(students['+idx+'].phone,'Hola '+students['+idx+'].name+'! 🌸')" class="smb" style="background:#25D366">💬 WA</button>';
    if(!isBaja) h+='<button onclick="openRegisterPayment('+idx+')" class="smb" style="background:#7aab8a">💰 Pago</button>';
    h+='</div></div></div>';
  });
  return h;
}

function rAdminPagos(){
  const overdue=students.filter(s=>payStatus(s.name)==='overdue');
  const warn=students.filter(s=>payStatus(s.name)==='warning');
  const ok=students.filter(s=>payStatus(s.name)==='ok');
  const none=students.filter(s=>payStatus(s.name)==='none');
  let h='<div style="font-size:11px;color:#9a7080;letter-spacing:1.5px;margin-bottom:14px;font-weight:bold">💰 ESTADO DE PAGOS</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px">';
  h+='<div class="card" style="text-align:center;padding:12px;border-top:3px solid #e57373"><div style="font-size:24px;font-weight:bold;color:#e57373">'+overdue.length+'</div><div style="font-size:10px;color:#9a7080">VENCIDO</div></div>';
  h+='<div class="card" style="text-align:center;padding:12px;border-top:3px solid #ffb74d"><div style="font-size:24px;font-weight:bold;color:#ffb74d">'+warn.length+'</div><div style="font-size:10px;color:#9a7080">POR VENCER</div></div>';
  h+='<div class="card" style="text-align:center;padding:12px;border-top:3px solid #7aab8a"><div style="font-size:24px;font-weight:bold;color:#7aab8a">'+ok.length+'</div><div style="font-size:10px;color:#9a7080">AL DÍA</div></div>';
  h+='<div class="card" style="text-align:center;padding:12px;border-top:3px solid #ddd"><div style="font-size:24px;font-weight:bold;color:#bbb">'+none.length+'</div><div style="font-size:10px;color:#9a7080">SIN DATO</div></div>';
  h+='</div>';
  function payRow(s,bc){
    const i=students.indexOf(s);
    const p=getPay(s.name);
    const dl=daysLeft(s.name);
    return '<div class="row" style="margin-bottom:6px;border-left:4px solid '+bc+'"><div style="flex:1"><div style="font-size:14px;font-weight:bold;color:#5a3a4a">'+s.name+'</div><div style="font-size:11px;color:#9a7080;margin-top:2px">'+(p?'Pagó: '+p.paidDate+' · Vence: '+p.dueDate:'Sin pago registrado')+'</div></div><div style="display:flex;gap:4px"><button onclick="openRegisterPayment('+i+')" class="smb" style="background:#7aab8a">💰</button><button onclick="sendDebt('+i+')" class="smb" style="background:#25D366">📲</button></div></div>';
  }
  if(overdue.length){
    h+='<div style="font-size:11px;color:#c06060;font-weight:bold;letter-spacing:1px;margin-bottom:8px">❗ VENCIDOS</div>';
    overdue.forEach(s=>h+=payRow(s,'#e57373'));
  }
  if(warn.length){
    h+='<div style="font-size:11px;color:#e59040;font-weight:bold;letter-spacing:1px;margin:14px 0 8px">⚠️ VENCEN PRONTO</div>';
    warn.forEach(s=>h+=payRow(s,'#ffb74d'));
  }
  if(ok.length){
    h+='<div style="font-size:11px;color:#7aab8a;font-weight:bold;letter-spacing:1px;margin:14px 0 8px">✓ AL DÍA</div>';
    ok.forEach(s=>h+=payRow(s,'#a5d4b4'));
  }
  if(none.length){
    h+='<div style="font-size:11px;color:#bbb;font-weight:bold;letter-spacing:1px;margin:14px 0 8px">SIN REGISTRAR</div>';
    none.forEach(s=>h+=payRow(s,'#ddd'));
  }
  return h;
}

function rAdminClases(){
  let h='<div style="font-size:11px;color:#9a7080;letter-spacing:1.5px;margin-bottom:12px;font-weight:bold">📅 HORARIOS</div>';
  h+='<div class="card" style="margin-bottom:16px"><div style="font-size:11px;color:#9a7080;letter-spacing:1px;margin-bottom:10px">NUEVA CLASE</div>';
  h+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
  h+='<select id="nc-day" style="flex:1;min-width:100px">'+ALL_DAYS.map(d=>'<option>'+d+'</option>').join('')+'</select>';
  h+='<input type="time" id="nc-time" value="09:00" style="width:100px">';
  h+='<select id="nc-teacher" style="flex:1;min-width:100px">'+Object.keys(TEACHERS).map(t=>'<option>'+t+'</option>').join('')+'</select>';
  h+='<input type="number" id="nc-spots" value="10" min="1" max="20" style="width:60px">';
  h+='<button onclick="addNewClass()" class="smb" style="background:#d4809a;padding:8px 14px">+ Agregar</button>';
  h+='</div></div>';
  ALL_DAYS.forEach(day=>{
    const dc=classes.filter(c=>c.day===day);
    if(!dc.length) return;
    h+='<div style="font-size:10px;letter-spacing:2px;color:white;background:'+DAY_COLORS[day]+';padding:5px 12px;border-radius:8px 8px 0 0;display:inline-block">'+day.toUpperCase()+'</div>';
    dc.forEach(c=>{
      const abs=absFor(c.id);
      h+='<div style="background:rgba(255,255,255,0.8);border:1px solid rgba(200,180,180,0.2);border-radius:0 10px 10px 10px;margin-bottom:7px">';
      h+='<div style="display:flex;align-items:center;padding:10px 14px;gap:8px">';
      h+='<span style="font-weight:bold;color:#5a3a4a;flex:1">'+c.time+'hs <span style="font-size:11px;color:#b09080;font-weight:normal">· '+c.teacher+'</span></span>';
      h+='<span style="font-size:11px;color:#9a7080">'+c.enrolled.length+'/'+c.spots+'</span>';
      h+='<button onclick="this.parentElement.nextElementSibling.style.display=this.parentElement.nextElementSibling.style.display===\'none\'?\'block\':\'none\'" style="background:none;border:none;cursor:pointer;font-size:14px">▼</button>';
      h+='<button onclick="rmClass('+c.id+')" style="background:none;border:none;cursor:pointer;font-size:14px">🗑️</button>';
      h+='</div>';
      h+='<div style="display:none;padding:0 14px 12px"><div style="font-size:10px;color:#9a7080;letter-spacing:1px;margin-bottom:7px">INSCRIPTAS — tocá para agregar/quitar</div><div>';
      students.forEach(s=>{
        const on=c.enrolled.includes(s.name);
        const struck=abs.includes(s.name);
        h+='<button class="itag'+(on?' on':'')+'" onclick="toggleEnroll('+c.id+',\''+s.name.replace(/'/g,"\\'")+'\')" style="'+(struck?'text-decoration:line-through;opacity:0.5;':'')+'">'+(on?'✓ ':'')+s.name+'</button>';
      });
      h+='</div></div></div>';
    });
  });
  return h;
}

function rAdminAusencias(){
  let h='<div style="font-size:11px;color:#9a7080;letter-spacing:1.5px;margin-bottom:12px;font-weight:bold">🙋 AUSENCIAS AVISADAS</div>';
  if(!absences.length) h+='<div style="color:#bbb;font-size:13px;text-align:center;padding:28px">No hay ausencias avisadas 🌸</div>';
  absences.forEach((a,i)=>{
    const cls=classes.find(c=>c.id==a.classId);
    h+='<div class="row" style="margin-bottom:6px"><div style="flex:1"><span style="font-weight:bold;color:#5a3a4a">'+a.studentName+'</span><span style="color:#aaa;margin-left:8px;font-size:12px">falta a '+(cls?cls.day+' '+cls.time+'hs':'clase eliminada')+'</span></div><button onclick="rmAbsence('+i+')" style="background:none;border:none;color:#e57373;cursor:pointer;font-size:16px">✕</button></div>';
  });
  return h;
}

function rAdminProfes(){
  const colors={"Anabella":"#d4a5a5","Maia":"#a5b4d4","Rocío":"#a5d4b4","Antonela":"#d4cca5","Iara":"#c4a5d4"};
  let h='<div style="font-size:11px;color:#9a7080;letter-spacing:1.5px;margin-bottom:12px;font-weight:bold">👩‍🏫 PROFES Y WHATSAPP</div>';
  Object.entries(TEACHERS).forEach(([name,phone])=>{
    h+='<div class="row" style="margin-bottom:8px;border-left:4px solid '+(colors[name]||'#ccc')+'"><div style="flex:1"><div style="font-weight:bold;color:#5a3a4a;font-size:14px">'+name+'</div><div style="font-size:11px;color:#9a8080;margin-top:2px">+'+phone+'</div></div>';
    h+='<button onclick="openWA(\''+phone+'\',\'Hola '+name+'! 🌸\')" class="smb" style="background:'+(colors[name]||'#ccc')+';color:#5a3a4a">💬 WhatsApp</button></div>';
  });
  return h;
}
</script>
