// Fetch with 5s timeout
function fetchTimeout(url){
  return new Promise(function(resolve){
    var done=false;
    var timer=setTimeout(function(){if(!done){done=true;resolve(null);}},5000);
    fetch(url).then(function(r){return r.json();}).then(function(d){
      if(!done){done=true;clearTimeout(timer);resolve(d);}
    }).catch(function(){if(!done){done=true;clearTimeout(timer);resolve(null);}});
  });
}
function dbGetSafe(path){return fetchTimeout(DB+"/"+path+".json");}

function rClases(){var h='<div class="card" style="margin-bottom:14px"><div style="font-size:11px;color:#9a7080;letter-spacing:1px;margin-bottom:10px">NUEVA CLASE</div><div style="display:flex;gap:6px;flex-wrap:wrap"><select id="ncd" style="flex:1;min-width:90px">'+ALL_DAYS.map(function(d){return'<option>'+d+'</option>';}).join('')+'</select><input type="time" id="nct" value="09:00" style="width:95px"><select id="nch" style="flex:1;min-width:90px">'+Object.keys(TEACHERS).map(function(t){return'<option>'+t+'</option>';}).join('')+'</select><input type="number" id="ncs" value="10" min="1" max="20" style="width:55px"><button onclick="addCls()" class="smb" style="background:#d4809a;padding:8px 12px">+ Agregar</button></div></div>';ALL_DAYS.forEach(function(day){var dc=classes.filter(function(c){return c.day===day;});if(!dc.length)return;h+='<div style="font-size:10px;letter-spacing:2px;color:white;background:'+DAY_COLORS[day]+';padding:5px 12px;border-radius:8px 8px 0 0;display:inline-block">'+day.toUpperCase()+'</div>';dc.forEach(function(c){var abs=absFor(c.id);h+='<div style="background:rgba(255,255,255,0.8);border:1px solid rgba(200,180,180,0.2);border-radius:0 10px 10px 10px;margin-bottom:7px"><div style="display:flex;align-items:center;padding:10px 14px;gap:8px"><span style="font-weight:bold;color:#5a3a4a;flex:1">'+c.time+'hs <span style="font-size:11px;color:#b09080;font-weight:normal">· '+c.teacher+'</span></span><span style="font-size:11px;color:#9a7080">'+c.enrolled.length+'/'+c.spots+'</span><button onclick="this.parentElement.nextElementSibling.style.display=this.parentElement.nextElementSibling.style.display==='none'?'block':'none'" style="background:none;border:none;cursor:pointer;font-size:13px">▼</button><button onclick="rmClass('+c.id+')" style="background:none;border:none;cursor:pointer;font-size:13px">🗑️</button></div><div style="display:none;padding:0 14px 12px"><div style="font-size:10px;color:#9a7080;letter-spacing:1px;margin-bottom:7px">INSCRIPTAS</div><div>';students.forEach(function(s){var on=c.enrolled.indexOf(s.name)>=0;var struck=abs.indexOf(s.name)>=0;h+='<button class="itag'+(on?' on':'')+'" onclick="toggleEnroll('+c.id+',''+s.name.replace(/'/g,"\'")+'''+')" style="'+(struck?'text-decoration:line-through;opacity:0.5;':'')+'">'+s.name+'</button>';});h+='</div></div></div>';});});return h;}

function rAusencias(){var h='<div style="font-size:11px;color:#9a7080;letter-spacing:1.5px;margin-bottom:12px;font-weight:bold">🙋 AUSENCIAS</div>';if(!absences.length)h+='<div style="color:#bbb;font-size:13px;text-align:center;padding:28px">No hay ausencias avisadas 🌸</div>';absences.forEach(function(a,i){var cls=classes.find(function(c){return c.id==a.classId;});h+='<div class="row" style="margin-bottom:6px"><div style="flex:1"><span style="font-weight:bold;color:#5a3a4a">'+a.studentName+'</span><span style="color:#aaa;margin-left:8px;font-size:12px">falta a '+(cls?cls.day+' '+cls.time+'hs':'clase eliminada')+'</span></div><button onclick="rmAbsence('+i+')" style="background:none;border:none;color:#e57373;cursor:pointer;font-size:16px">✕</button></div>';});return h;}

function rProfes(){var colors={Anabella:"#d4a5a5",Maia:"#a5b4d4","Rocío":"#a5d4b4",Antonela:"#d4cca5",Iara:"#c4a5d4"};var h='<div style="font-size:11px;color:#9a7080;letter-spacing:1.5px;margin-bottom:12px;font-weight:bold">👩‍🏫 PROFES</div>';Object.entries(TEACHERS).forEach(function(e){var name=e[0],phone=e[1];h+='<div class="row" style="margin-bottom:8px;border-left:4px solid '+(colors[name]||'#ccc')+'"><div style="flex:1"><div style="font-weight:bold;color:#5a3a4a">'+name+'</div><div style="font-size:11px;color:#9a8080;margin-top:2px">+'+phone+'</div></div><button onclick="openWA(''+phone+'','Hola '+name+'! 🌸')" class="smb" style="background:'+(colors[name]||'#ccc')+';color:#5a3a4a">💬</button></div>';});return h;}
</script>
