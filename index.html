.jbtn.sel{border:2px solid #8ab8d8;background:rgba(138,184,216,0.1)}

function rTeacherPanel(teacher){
  // Month selector UI
  h+="<div class=\"card\" style=\"margin-bottom:16px\">";
  h+="<div style=\"font-size:11px;color:#9a7080;font-weight:bold;letter-spacing:1px;margin-bottom:8px\">📅 PERÍODO</div>";
  h+="<select onchange=\"selContableMes(this.value)\" style=\"margin-bottom:0\">";
  // Build months list
  var nowP=new Date();
  var currentYMP=nowP.getFullYear()+"-"+(String(nowP.getMonth()+1).padStart(2,"0"));
  var currentYM=currentYMP;
  if(!contableMes)contableMes=currentYMP;
  var tm=contableMes;
  var allMonths=[currentYMP];
  payments.forEach(function(p){if(p.paidDate){var ym=p.paidDate.substring(0,7);if(allMonths.indexOf(ym)<0)allMonths.push(ym);}});
  allMonths.sort().reverse();
  var mNamesP=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  function fmtMP(ym){var pts=ym.split("-");return mNamesP[parseInt(pts[1])-1]+" "+pts[0];}
  allMonths.forEach(function(ym){
    h+="<option value=\""+ym+"\""+( ym===tm?" selected":"")+">"+fmtMP(ym)+(ym===currentYM?" · mes actual":"")+"</option>";
  });
  h+="</select></div>";
  // Build chart data - last 6 months
  var chartMonths=[];
  for(var mi=5;mi>=0;mi--){
    var cd=new Date(nowP.getFullYear(),nowP.getMonth()-mi,1);
    chartMonths.push(cd.getFullYear()+"-"+(String(cd.getMonth()+1).padStart(2,"0")));
  }
  var chartTotals=chartMonths.map(function(ym){
    return payments.filter(function(p){return p.paidDate&&p.paidDate.startsWith(ym);}).reduce(function(a,p){return a+Number(p.monto||0);},0);
  });
  var maxVal=Math.max.apply(null,chartTotals)||1;
  var shortNames=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  h+="<div class=\"card\" style=\"margin-bottom:16px\">";
  h+="<div style=\"font-size:11px;color:#9a7080;font-weight:bold;letter-spacing:1px;margin-bottom:12px\">📈 EVOLUCIÓN ÚLTIMOS 6 MESES</div>";
  h+="<div style=\"display:flex;align-items:flex-end;gap:8px;height:100px\">";
  chartMonths.forEach(function(ym,idx){
    var val=chartTotals[idx];
    var pct=val>0?Math.round(val/maxVal*100):2;
    var isCurrentMonth=ym===currentYM;
    var parts=ym.split("-");
    var label=shortNames[parseInt(parts[1])-1];
    h+="<div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:4px\">";
    h+="<div style=\"font-size:10px;color:#9a7080\">$"+(val>0?(val/1000).toFixed(0)+"k":"0")+"</div>";
    h+="<div style=\"width:100%;background:"+(isCurrentMonth?"#d4809a":"#a5b4d4")+";border-radius:4px 4px 0 0;height:"+pct+"px;min-height:4px\"></div>";
    h+="<div style=\"font-size:10px;color:"+(isCurrentMonth?"#d4809a":"#9a7080")+";font-weight:"+(isCurrentMonth?"bold":"normal")+"\">"+label+"</div>";
    h+="</div>";
  });
  h+="</div></div>";
  var colors={Anabella:"#d4a5a5",Maia:"#a5b4d4","Rocío":"#a5d4b4",Antonela:"#d4cca5",Iara:"#c4a5d4"};
  var now=new Date();
  var tm=now.getFullYear()+"-"+(String(now.getMonth()+1).padStart(2,"0"));
  var ptm=payments.filter(function(p){return p.paidDate&&p.paidDate.startsWith(tm);});
  var mn=now.toLocaleString("es-AR",{month:"long",year:"numeric"});

  // Get teacher students
  var isAntonela=teacher==="Antonela";
  var tStudents=students.filter(function(s){
    if(s.active===false)return false;
    var myCls=classes.filter(function(c){return c.enrolled.indexOf(s.name)>=0;});
    return myCls.length>0&&myCls[0].teacher===teacher;
  });

  var tTotal=0;
  tStudents.forEach(function(s){
    var pay=ptm.find(function(p){return p.name===s.name;});
    if(pay)tTotal+=Number(pay.monto||0);
  });

  var myCorr=isAntonela?tTotal:Math.round(tTotal*0.5);

  // For Antonela: also add 50% from each other teacher
  var extraLines="";
  var extraTotal=0;
  if(isAntonela){
    Object.keys(TEACHERS).forEach(function(t){
      if(t==="Antonela")return;
      var ts=students.filter(function(s){
        if(s.active===false)return false;
        var myCls=classes.filter(function(c){return c.enrolled.indexOf(s.name)>=0;});
        return myCls.length>0&&myCls[0].teacher===t;
      });
      var tt=0;
      ts.forEach(function(s){var pay=ptm.find(function(p){return p.name===s.name;});if(pay)tt+=Number(pay.monto||0);});
      var tc=Math.round(tt*0.5);
      extraTotal+=tc;
      extraLines+="<div style=\"display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(200,180,180,0.15)\"><span style=\"font-size:13px;color:#5a3a4a\">50% de alumnas de "+t+"</span><span style=\"font-size:13px;font-weight:bold;color:#7aab8a\">$"+tc.toLocaleString("es-AR")+"</span></div>";
    });
  }

  var grandTotal=myCorr+extraTotal;

  var h="<div style=\"background:"+(colors[teacher]||"#ddd")+";border-radius:16px;padding:20px;margin-bottom:16px;text-align:center\">";
  h+="<div style=\"font-size:13px;color:#5a3a4a;opacity:0.8\">"+mn.toUpperCase()+"</div>";
  h+="<div style=\"font-size:22px;font-weight:bold;color:#3a2a3a;margin:6px 0\">Hola, "+teacher+"! 👋</div>";
  h+="<div style=\"font-size:13px;color:#5a3a4a;opacity:0.8\">Tu liquidación del mes</div></div>";

  // Summary card
  h+="<div class=\"card\" style=\"margin-bottom:16px;text-align:center;border-top:3px solid "+(colors[teacher]||"#ddd")+"\">";
  h+="<div style=\"font-size:12px;color:#9a7080;margin-bottom:8px\">TOTAL A COBRAR</div>";
  h+="<div style=\"font-size:32px;font-weight:bold;color:#5a8a6a\">$"+grandTotal.toLocaleString("es-AR")+"</div>";
  if(isAntonela&&extraTotal>0){
    h+="<div style=\"font-size:12px;color:#9a7080;margin-top:8px\">Tus alumnas: $"+myCorr.toLocaleString("es-AR")+" + Otras profes: $"+extraTotal.toLocaleString("es-AR")+"</div>";
  } else if(!isAntonela){
    h+="<div style=\"font-size:12px;color:#9a7080;margin-top:4px\">50% de $"+tTotal.toLocaleString("es-AR")+" recaudado</div>";
  }
  h+="</div>";

  if(isAntonela&&extraTotal>0){
    h+="<div class=\"card\" style=\"margin-bottom:16px\">";
    h+="<div style=\"font-size:11px;color:#9a7080;font-weight:bold;letter-spacing:1px;margin-bottom:10px\">DETALLE DE INGRESOS</div>";
    h+="<div style=\"display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(200,180,180,0.15)\"><span style=\"font-size:13px;color:#5a3a4a\">100% de tus alumnas</span><span style=\"font-size:13px;font-weight:bold;color:#7aab8a\">$"+myCorr.toLocaleString("es-AR")+"</span></div>";
    h+=extraLines;
    h+="</div>";
  }

  // Student list
  h+="<div style=\"font-size:11px;color:#9a7080;font-weight:bold;letter-spacing:1px;margin-bottom:10px\">TUS ALUMNAS ("+tStudents.length+")</div>";
  var pagaron=tStudents.filter(function(s){return ptm.find(function(p){return p.name===s.name;});});
  var deben=tStudents.filter(function(s){return!ptm.find(function(p){return p.name===s.name;});});

  if(pagaron.length){
    h+="<div style=\"font-size:10px;color:#7aab8a;font-weight:bold;margin-bottom:6px\">✓ PAGARON ("+pagaron.length+")</div>";
    pagaron.forEach(function(s){
      var pay=ptm.find(function(p){return p.name===s.name;});
      h+="<div class=\"row\" style=\"margin-bottom:5px;border-left:4px solid #a5d4b4\"><div style=\"flex:1\"><div style=\"font-size:13px;font-weight:bold;color:#5a3a4a\">"+s.name+"</div><div style=\"font-size:11px;color:#9a7080\">Vence: "+pay.dueDate+"</div></div><span style=\"font-size:13px;font-weight:bold;color:#7aab8a\">$"+Number(pay.monto||0).toLocaleString("es-AR")+"</span></div>";
    });
  }
  if(deben.length){
    h+="<div style=\"font-size:10px;color:#c06060;font-weight:bold;margin:12px 0 6px\">❗ DEBEN ("+deben.length+")</div>";
    deben.forEach(function(s){
      h+="<div class=\"row\" style=\"margin-bottom:5px;border-left:4px solid #e57373\"><div style=\"flex:1\"><div style=\"font-size:13px;font-weight:bold;color:#5a3a4a\">"+s.name+"</div><div style=\"font-size:11px;color:#e57373\">Sin pago este mes</div></div></div>";
    });
  }

  h+="<button onclick=\"loggedTeacher=null;showView('home')\" style=\"width:100%;padding:12px;background:none;border:1px solid rgba(200,180,180,0.4);color:#9a7080;border-radius:12px;font-size:13px;cursor:pointer;font-family:Georgia,serif;margin-top:20px\">← Salir</button>";
  return h;
}

function rPagar(){
  var s=students.find(function(x){return x.name===alumnaName;});
  var freq=s?s.freq:"";
  var cuotaTotal=freq==="3"?cuotas.v3:freq==="2"?cuotas.v2:0;
  var ep=getPay(alumnaName);
  // Check if this is first month payment (has pending entry = paid seña already)
  var isPending=pending.find(function(p){return p.name===alumnaName;});
  var isFirstMonth=isPending||(!ep);
  var sena=5000;
  var monto=isFirstMonth&&cuotaTotal>0?cuotaTotal-sena:cuotaTotal;
  var h="<button class=\"bbtn\" onclick=\"goHome()\">← Volver</button>";
  h+="<div style=\"font-size:22px;font-weight:bold;color:#5a7a5a;margin-bottom:6px\">💳 Pagar mi cuota</div>";
  h+="<div style=\"font-size:13px;color:#9a7080;margin-bottom:20px\">Hola <b>"+alumnaName+"</b>!</div>";
  if(cuotaTotal>0){
    h+="<div class=\"card\" style=\"margin-bottom:14px;border-top:3px solid #7aab8a\">";
    if(isFirstMonth&&ep===undefined){
      h+="<div style=\"font-size:11px;color:#9a7080;font-weight:bold;letter-spacing:1px;margin-bottom:10px\">💰 PRIMER MES</div>";
      h+="<div style=\"display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(200,180,180,0.15)\"><span style=\"font-size:13px;color:#5a3a4a\">Cuota completa</span><span style=\"font-size:13px;color:#5a3a4a\">$"+cuotaTotal.toLocaleString("es-AR")+"</span></div>";
      h+="<div style=\"display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(200,180,180,0.15)\"><span style=\"font-size:13px;color:#5a3a4a\">Seña ya abonada</span><span style=\"font-size:13px;color:#7aab8a\">- $"+sena.toLocaleString("es-AR")+"</span></div>";
      h+="<div style=\"display:flex;justify-content:space-between;padding:8px 0\">";
      h+="<span style=\"font-size:15px;font-weight:bold;color:#5a3a4a\">Total a pagar</span>";
      h+="<span style=\"font-size:22px;font-weight:bold;color:#5a7a5a\">$"+monto.toLocaleString("es-AR")+"</span></div>";
    } else {
      h+="<div style=\"font-size:11px;color:#9a7080;font-weight:bold;letter-spacing:1px;margin-bottom:10px\">💰 CUOTA MENSUAL</div>";
      h+="<div style=\"display:flex;justify-content:space-between;padding:8px 0\">";
      h+="<span style=\"font-size:15px;font-weight:bold;color:#5a3a4a\">Total a pagar</span>";
      h+="<span style=\"font-size:22px;font-weight:bold;color:#5a7a5a\">$"+monto.toLocaleString("es-AR")+"</span></div>";
      h+="<div style=\"font-size:11px;color:#9a7080\">"+(freq==="3"?"3 veces/semana":"2 veces/semana")+"</div>";

  students=students.map(function(st){

    hist.sort(function(a,b){return b.paidDate.localeCompare(a.paidDate);});

function saveSt(idx){
  var name=document.getElementById("en").value.trim();
  if(!name)return notif("Escribí el nombre","error");
  var isNew=idx===-1;
  var oldName=isNew?null:students[idx].name;
  var oldActive=isNew?true:(students[idx].active!==false);
  if(isNew&&students.find(function(s){return s.name===name;}))return notif("Ya existe","error");
  var freq=document.getElementById("ef").value;
  var time=document.getElementById("et").value;
  var paid=document.getElementById("epp").value;
  var due=document.getElementById("epd").value;
  if(!isNew)unenroll(oldName);
  if(freq&&time&&oldActive)enroll(name,freq,time);
  var st={name:name,phone:document.getElementById("ep").value.trim(),freq:freq,time:time,active:oldActive,
    birthdate:document.getElementById("eb").value,dni:document.getElementById("ed").value.trim(),
    profession:"",startDate:document.getElementById("est")?document.getElementById("est").value:"",
emergency:document.getElementById("ee").value.trim(),
    notes:document.getElementById("eo").value.trim()};
  if(isNew)students=[].concat(students,[st]).sort(function(a,b){return a.name.localeCompare(b.name);});
  else{
    students=students.map(function(s,i){return i===idx?st:s;});
    absences=absences.map(function(a){return a.studentName===oldName?Object.assign({},a,{studentName:name}):a;});
    payments=payments.map(function(p){return p.name===oldName?Object.assign({},p,{name:name}):p;});
    saveA();saveP();
  }
  if(paid&&due){payments=payments.filter(function(p){return p.name!==name;});payments.push({name:name,paidDate:paid,dueDate:due,monto:""});saveP();}
  saveS();saveC();closeModal();notif("✓ "+(isNew?"Alumna agregada":"Guardado"));render();
}
function toggleBaja(idx){
  students[idx].active=students[idx].active===false?true:false;
  if(!students[idx].active)unenroll(students[idx].name);
  saveS();saveC();closeModal();notif(students[idx].active?"✓ Reactivada":"Dada de baja");render();
}
function delSt(idx){
  if(!confirm("¿Eliminar a "+students[idx].name+"?"))return;
  var name=students[idx].name;unenroll(name);
  students=students.filter(function(_,i){return i!==idx;});
  absences=absences.filter(function(a){return a.studentName!==name;});
  payments=payments.filter(function(p){return p.name!==name;});
  saveS();saveC();saveA();saveP();closeModal();notif("Eliminada");render();
}
function filterAlumnas(){
  var val=document.getElementById("asearch");
  if(!val)return;
  alumnaSearch=val.value;
  var q=alumnaSearch.toLowerCase();
  var cards=document.querySelectorAll(".alumna-card");
  cards.forEach(function(c){
    var name=c.getAttribute("data-name")||"";
    c.style.display=(!q||name.indexOf(q)>=0)?"":"none";
  });
}
function approvePending(name,cid){
  // Move from pending to enrolled
  var p=pending.find(function(x){return x.name===name;});
  if(!p)return;
  // Add to students if not exists
  if(!students.find(function(s){return s.name===name;})){
    students.push({name:name,phone:p.phone||"",freq:p.freq,time:p.time,active:true,birthdate:"",dni:p.dni||"",profession:p.profession||"",emergency:p.emergency||"",notes:p.notes||""});
    students.sort(function(a,b){return a.name.localeCompare(b.name);});
    saveS();
  }
  // Enroll in classes
  enroll(name,p.freq,p.time);
  saveC();
  // Remove from pending
  pending=pending.filter(function(x){return x.name!==name;});
  savePending();
  notif("✓ "+name+" inscripta correctamente");
  render();
}
function removePending(name){
  pending=pending.filter(function(p){return p.name!==name;});
  savePending();
  notif("Solicitud eliminada");
  render();
}
function toggleEnroll(cid,name){
  classes=classes.map(function(c){
    if(c.id!=cid)return c;
    var e=c.enrolled.indexOf(name)>=0?c.enrolled.filter(function(x){return x!==name;}):c.enrolled.concat([name]);
    return Object.assign({},c,{enrolled:e});
  });saveC();render();
}
function rmClass(id){classes=classes.filter(function(c){return c.id!=id;});saveC();render();}
function rmAbsence(i){absences=absences.filter(function(_,j){return j!==i;});saveA();render();}
function addCls(){
  var day=document.getElementById("ncd").value,time=document.getElementById("nct").value;
  var teacher=document.getElementById("nch").value,spots=parseInt(document.getElementById("ncs").value)||10;
  classes.push({id:Date.now(),day:day,time:time,teacher:teacher,spots:spots,enrolled:[]});saveC();render();
}
function absFor(id){return absences.filter(function(a){return a.classId==id;}).map(function(a){return a.studentName;});}
function free(c){
  var pendingCount=pending.filter(function(p){
    return p.time===c.time&&((p.freq==="3"&&c.day==="Lunes")||(p.freq==="2"&&c.day==="Martes"));
  }).length;
  return absFor(c.id).length+(c.spots-c.enrolled.length-pendingCount);
}

function confirmJoin(){
  var name=alumnaName||joinSt;
  if(!selClass||!name)return notif("Completá todos los campos","error");
  var cls=classes.find(function(c){return c.id==selClass;});
  if(free(cls)<=0)return notif("No hay lugares","error");
  if(cls.enrolled.indexOf(name)>=0)return notif("Ya estás inscripta","error");
  var isAdvance=window._joinMode==="advance";
  classes=classes.map(function(c){return c.id==selClass?Object.assign({},c,{enrolled:c.enrolled.concat([name])}):c;});
  var rm=absences.find(function(a){return a.classId==selClass;});
  if(rm)absences=absences.filter(function(a){return!(a.classId==selClass&&a.studentName===rm.studentName);});
  var today=new Date().toISOString().split("T")[0];
  absences.push({classId:selClass,studentName:name,recovery:true,date:today,type:isAdvance?"advance":"recover"});
  // If advancing: auto-free tomorrow's class
  if(isAdvance){
    var now=new Date();
    var dayNames=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    var tomorrowName=dayNames[(now.getDay()+1)%7];
    var tomorrowCls=classes.find(function(c){return c.day===tomorrowName&&c.enrolled.indexOf(name)>=0;});
    if(tomorrowCls&&!absences.find(function(a){return a.classId==tomorrowCls.id&&a.studentName===name;})){
      absences.push({classId:tomorrowCls.id,studentName:name});
      notif("¡Genial! Tu clase de mañana quedó libre 🎉");
    } else {
      notif("¡Genial! 🎉");
    }
  } else {
    notif("¡Genial! 🎉");
  }
  saveC();saveA();
  // Find original class of this student
  var origCls=classes.filter(function(c){return c.enrolled.indexOf(name)>=0;});
  var origTeacher=origCls.length>0?origCls[0].teacher:"";
  var origTime=origCls.length>0?origCls[0].time:"";
  var origDays=[].concat(origCls.map(function(c){return c.day;})).filter(function(v,i,a){return a.indexOf(v)===i;});
  var origInfo=origTeacher?"\n👩‍🏫 Su profe habitual: "+origTeacher+(origTime?" · "+origTime+"hs":"")+(origDays.length?" ("+origDays.join("/")+")":""):"";
  var m="🌸 *Pilates Mare*\n\nHola "+cls.teacher+"! *"+name+"* se anotó en tu clase del *"+cls.day+" a las "+cls.time+"hs* para recuperar."+origInfo+" 🧘‍♀️";
  openWA(TEACHERS[cls.teacher],m);showView("home");
}

function render(){
  var prevSearch=alumnaSearch;
  var el=document.getElementById("wrap");
  if(view==="home")el.innerHTML=rHome();
  else if(view==="absence")el.innerHTML=rAbsence();
  else if(view==="join")el.innerHTML=rJoin();
  else if(view==="new")el.innerHTML=rNew();
  else if(view==="quit")el.innerHTML=rQuit();
  else if(view==="pagar")el.innerHTML=rPagar();
  else if(view==="admin"){el.innerHTML=rAdmin();if(adminTab==="alumnas"&&prevSearch){var si=document.getElementById("asearch");if(si){si.value=prevSearch;si.focus();si.setSelectionRange(si.value.length,si.value.length);}filterAlumnas();}}
}

function rAbsence(){
  var nombre=alumnaName||selStudent;
  var h="<button class=\"bbtn\" onclick=\"goHome()\">← Volver</button>";
  h+="<div style=\"font-size:22px;font-weight:bold;color:#7a4a5a;margin-bottom:6px\">🙋‍♀️ Aviso que falto</div>";
  h+="<div style=\"font-size:13px;color:#9a7080;margin-bottom:20px\">Tu lugar quedará disponible.</div>";
  if(!nombre){
    h+="<label>¿Cuál es tu nombre?</label><select onchange=\"selStudent=this.value;render()\"><option value=\"\">Seleccioná tu nombre...</option>";
    students.filter(function(s){return s.active!==false;}).forEach(function(s){
      h+="<option value=\""+s.name+"\""+( s.name===selStudent?" selected":"")+">"+s.name+"</option>";
    });
    h+="</select>";
  } else {
    h+="<div style=\"background:rgba(212,128,154,0.1);border-radius:12px;padding:10px 14px;margin-bottom:16px;font-size:14px;font-weight:bold;color:#7a4a5a\">👤 "+nombre+"</div>";
  }
  var usedName=nombre||selStudent;
  if(usedName){
    h+="<label style=\"margin-top:8px\">¿A qué clase no vas a ir?</label>";
    var found=false;
    ALL_DAYS.forEach(function(day){
      var dc=classes.filter(function(c){return c.day===day&&c.enrolled.indexOf(usedName)>=0;});
      if(!dc.length)return;
      found=true;

}

function rJoin(){
  var now=new Date();
  var dayNames=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  var todayNum=now.getDay();
  var nextNum=(todayNum+1)%7;
  var todayName=dayNames[todayNum];
  var tomorrowName=dayNames[nextNum];
  var nowHour=now.getHours();
  var nowMin=now.getMinutes();
  var myName=alumnaName||joinSt;
  var joinMode=window._joinMode||"";

  // Count changes this month
  var nowYM=now.getFullYear()+"-"+(String(now.getMonth()+1).padStart(2,"0"));
  var myChanges=absences.filter(function(a){
    return a.studentName===myName&&a.recovery===true&&a.date&&a.date.startsWith(nowYM);
  }).length;
  var remaining=3-myChanges;

  var h="<button class=\"bbtn\" onclick=\"goHome()\">← Volver</button>";
  h+="<div style=\"font-size:22px;font-weight:bold;color:#4a5a7a;margin-bottom:6px\">🔄 Cambiar clase</div>";
  h+="<div style=\"font-size:13px;color:#9a7080;margin-bottom:6px\">Hola <b>"+myName+"</b>!</div>";

  var badgeCol=remaining>0?"#7aab8a":"#e57373";
  h+="<div style=\"display:flex;align-items:center;gap:8px;margin-bottom:16px;background:rgba(255,255,255,0.7);border-radius:12px;padding:10px 14px\">";
  h+="<span style=\"font-size:22px;font-weight:bold;color:"+badgeCol+"\">"+remaining+"</span>";
  h+="<div><div style=\"font-size:13px;font-weight:bold;color:#5a3a4a\">cambio"+(remaining!==1?"s":"")+" disponible"+(remaining!==1?"s":"")+" este mes</div>";
  h+="<div style=\"font-size:11px;color:#9a7080\">Máximo 3 por mes</div></div></div>";

  if(remaining<=0){
    h+="<div class=\"card\" style=\"text-align:center;color:#c06060;font-size:13px;padding:20px\">❗ Ya usaste tus 3 cambios del mes.<br><br>Contactate con el estudio si necesitás una excepción 🌸</div>";
    h+="<button onclick=\"openWA(TEACHERS['Antonela'],'Hola Antonela! Soy "+myName+", necesito un cambio extra este mes 🙏')\" class=\"pbtn\" style=\"background:linear-gradient(135deg,#25D366,#1da850);margin-top:10px\">📲 Contactar al estudio</button>";
    return h;
  }

  if(!joinMode){
    // Step 1: choose recover or advance
    h+="<div style=\"font-size:13px;color:#5a3a4a;font-weight:bold;margin-bottom:12px\">¿Qué querés hacer?</div>";
    h+="<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px\">";
    h+="<button onclick=\"setJoinMode('recover')\" style=\"padding:20px 10px;border-radius:14px;border:1px solid rgba(180,200,220,0.4);background:rgba(255,255,255,0.8);cursor:pointer;font-family:Georgia,serif;text-align:center\">";
    h+="<div style=\"font-size:28px;margin-bottom:8px\">🔄</div>";
    h+="<div style=\"font-size:14px;font-weight:bold;color:#3a4a6a;margin-bottom:4px\">Recuperar</div>";
    h+="<div style=\"font-size:11px;color:#9a7080\">Faltaste y querés ir otro día</div></button>";
    h+="<button onclick=\"setJoinMode('advance')\" style=\"padding:20px 10px;border-radius:14px;border:1px solid rgba(200,165,212,0.4);background:rgba(255,255,255,0.8);cursor:pointer;font-family:Georgia,serif;text-align:center\">";
    h+="<div style=\"font-size:28px;margin-bottom:8px\">⏩</div>";
    h+="<div style=\"font-size:14px;font-weight:bold;color:#5a3a5a;margin-bottom:4px\">Adelantar</div>";
    h+="<div style=\"font-size:11px;color:#9a7080\">Ir hoy y liberar tu clase de mañana</div></button>";
    h+="</div>";
    return h;
  }

  // Step 2: show available classes
  var isAdvance=joinMode==="advance";
  var allowedDays=isAdvance?[todayName]:[todayName,tomorrowName];

  // Student's fixed days and class IDs
  var myClasses=classes.filter(function(c){return c.enrolled.indexOf(myName)>=0;});
  var myDays=[].concat(myClasses.map(function(c){return c.day;})).filter(function(v,i,a){return a.indexOf(v)===i;});
  var myClsIds=myClasses.map(function(c){return c.id;});

  var dayNames2=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  var prevDayName=dayNames2[(todayNum+6)%7];

  var avail=classes.filter(function(c){
    if(free(c)<=0)return false;
    if(myClsIds.indexOf(c.id)>=0)return false;
    var parts=c.time.split(":");
    var clsHour=parseInt(parts[0]);
    var clsMin=parseInt(parts[1]);
    var isFutureToday=clsHour>nowHour||(clsHour===nowHour&&clsMin>nowMin);

    if(isAdvance){
      // Adelantar: mismo día a distinto horario (futuro) O día anterior
      if(c.day===todayName&&myDays.indexOf(c.day)>=0){
        // Same fixed day, different time, not passed
        return isFutureToday;
      }
      if(c.day===prevDayName&&myDays.indexOf(todayName)>=0){
        // Day before a fixed day - all future classes (prev day is today-1, already passed)
        // Actually prevDay already passed so skip it
        return false;
      }
      // Yesterday already passed. Check if today is a fixed day and show yesterday
      // Better: show classes from yesterday's equivalent
      // If today is Tuesday and fixed days are Wed/Fri, can advance Wed by going Tue
      // So: show classes of days that are ONE DAY BEFORE a fixed day
      var dayIdx=dayNames2.indexOf(c.day);
      var nextDayName=dayNames2[(dayIdx+1)%7];
      if(myDays.indexOf(nextDayName)>=0){
        // This day is before a fixed day
        if(c.day===todayName)return isFutureToday;
        // Check it's within next 1 day
        var diff2=(dayIdx-todayNum+7)%7;
        return diff2===1; // only tomorrow
      }
      return false;
    } else {
      // Recuperar: days that are NOT fixed days
      if(myDays.indexOf(c.day)>=0)return false;
      if(c.day===todayName)return isFutureToday;
      var dIdx=dayNames2.indexOf(c.day);
      var diff3=(dIdx-todayNum+7)%7;
      return diff3>=1&&diff3<=2;
    }
  });

  h+="<div style=\"background:"+(isAdvance?"rgba(200,165,212,0.15)":"rgba(138,184,216,0.15)")+";border-radius:12px;padding:10px 14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center\">";
  h+="<div><div style=\"font-size:14px;font-weight:bold;color:#5a3a4a\">"+(isAdvance?"⏩ Adelantar clase":"🔄 Recuperar clase")+"</div>";
  if(isAdvance)h+="<div style=\"font-size:11px;color:#9a7080\">Tu clase de mañana quedará libre automáticamente</div>";
  h+="</div><button onclick=\"setJoinMode('')\" style=\"background:none;border:none;color:#9a7080;cursor:pointer;font-size:12px;font-family:Georgia,serif\">← Cambiar</button></div>";

  h+="<label>¿A qué clase querés ir?</label>";
  if(!avail.length){
    h+="<div class=\"card\" style=\"text-align:center;color:#aaa;font-size:13px\">No hay lugares disponibles "+(isAdvance?"para hoy":"para hoy o mañana")+" 🌸</div>";
  } else {
    // Group by day
    var shownDays=[].concat(avail.map(function(c){return c.day;})).filter(function(v,i,a){return a.indexOf(v)===i;});
    shownDays.forEach(function(day){
      var dayCls=avail.filter(function(c){return c.day===day;});
      if(!dayCls.length)return;
      var label=day===todayName?"Hoy":day===tomorrowName?"Mañana":day;
      h+="<div style=\"font-size:10px;letter-spacing:2px;color:white;background:"+(DAY_COLORS[day]||"#aaa")+";padding:5px 12px;border-radius:8px 8px 0 0;display:inline-block\">"+label.toUpperCase()+" · "+day.toUpperCase()+"</div>";
      dayCls.forEach(function(c){
        var f=free(c);var isSel=selClass==c.id;
        if(isSel){
          h+="<div style=\"display:flex;gap:8px;margin-bottom:8px\">";
          h+="<button class=\"jbtn sel\" onclick=\"clearSelClass()\" style=\"flex:1;margin-bottom:0\"><div><div style=\"font-size:14px;font-weight:bold;color:#3a4a6a\">"+c.time+"hs</div><div style=\"font-size:11px;color:#8090a0;margin-top:2px\">👩‍🏫 "+c.teacher+" · "+c.enrolled.length+"/"+c.spots+"</div></div><span class=\"badge bg\">"+f+" libre"+(f>1?"s":"")+"</span></button>";
          h+="<button onclick=\"confirmJoin()\" style=\"background:linear-gradient(135deg,"+(isAdvance?"#c8a5d4,#b08ac8":"#8ab8d8,#a5c8e8")+";border:none;color:white;border-radius:12px;padding:0 16px;font-size:13px;font-family:Georgia,serif;cursor:pointer;flex-shrink:0\">✓ Confirmar 📲</button>";
          h+="</div>";
        } else {
          h+="<button class=\"jbtn\" onclick=\"setSelClass("+c.id+")\" style=\"margin-bottom:7px\"><div><div style=\"font-size:14px;font-weight:bold;color:#3a4a6a\">"+c.time+"hs</div><div style=\"font-size:11px;color:#8090a0;margin-top:2px\">👩‍🏫 "+c.teacher+" · "+c.enrolled.length+"/"+c.spots+"</div></div><span class=\"badge bg\">"+f+" libre"+(f>1?"s":"")+"</span></button>";
        }
      });
    });
  }
  return h;
}

  h+="<div class=\"tabs\" style=\"border-bottom:1px solid rgba(200,180,180,0.3);padding-bottom:10px;margin-bottom:14px\">";
  var tabs=[["alumnas","👩‍🎓 Alumnas"],["pagos","💰 Pagos"],["contable","📊 Contable"],["clases","📅 Horarios"],["ausencias","🙋 Ausencias"],["profes","👩‍🏫 Profes"]];
  tabs.forEach(function(k){
    h+="<button class=\"tab"+(adminTab===k[0]?" on":"")+"\" style=\""+(adminTab===k[0]?"background:#d4809a;":"")+"\" onclick=\"adminTab='"+k[0]+"';render()\">"+k[1]+"</button>";
  });
  h+="</div>";
  if(adminTab==="alumnas")h+=rAlumnas();
  else if(adminTab==="pagos")h+=rPagos();
  else if(adminTab==="contable")h+=rContable();
  else if(adminTab==="clases")h+=rClases();
  else if(adminTab==="ausencias")h+=rAusencias();
  else if(adminTab==="profes")h+=rProfes();
  return h;
}

function rAlumnas(){
  var active=students.filter(function(s){return s.active!==false;});
  var bajas=students.filter(function(s){return s.active===false;});
  var showB=window._sb||false;
  var h="<div style=\"font-size:11px;color:#9a7080;letter-spacing:1.5px;margin-bottom:12px;font-weight:bold\">👩‍🎓 "+active.length+" ACTIVAS · "+bajas.length+" BAJAS</div>";
  h+="<button onclick=\"openEditSt(-1)\" style=\"width:100%;padding:12px;background:linear-gradient(135deg,#7aab8a,#5a9a7a);border:none;color:white;border-radius:12px;font-size:14px;cursor:pointer;font-family:Georgia,serif;margin-bottom:10px\">+ Agregar nueva alumna</button>";
  h+="<input type=\"text\" id=\"asearch\" placeholder=\"🔍 Buscar alumna...\" value=\""+alumnaSearch+"\" oninput=\"alumnaSearch=this.value;filterAlumnas()\" style=\"margin-bottom:14px\">";
  if(bajas.length)h+="<button onclick=\"window._sb=!window._sb;render()\" style=\"width:100%;padding:8px;background:none;border:1px solid rgba(200,180,180,0.4);color:#9a7080;border-radius:10px;font-size:12px;cursor:pointer;font-family:Georgia,serif;margin-bottom:12px\">"+(showB?"Ocultar bajas":"Ver bajas ("+bajas.length+")")+"</button>";
  (showB?students:active).forEach(function(s){
    var idx=students.indexOf(s);
    var st=payStatus(s.name);var isBaja=s.active===false;
    var bc=isBaja?"#bbb":st==="overdue"?"#e57373":st==="warning"?"#ffb74d":st==="ok"?"#a5d4b4":"#ddd";
    var myCls=classes.filter(function(c){return c.enrolled.indexOf(s.name)>=0;});
    var days=[].concat(myCls.map(function(c){return c.day;})).filter(function(v,i,a){return a.indexOf(v)===i;});
    var freq=days.indexOf("Lunes")>=0?"L/M/V":days.indexOf("Martes")>=0?"Mar/Jue":null;
    var time=myCls.length>0?myCls[0].time:null;
    var p=getPay(s.name);var dl=daysLeft(s.name);
    h+="<div class=\"card alumna-card\" data-name=\""+s.name.toLowerCase()+"\" style=\"margin-bottom:8px;border-left:4px solid "+bc+";padding:12px;"+(isBaja?"opacity:0.6;":"")+"\">";
    h+="<div style=\"display:flex;justify-content:space-between;align-items:flex-start\">";
    h+="<div style=\"flex:1\"><div style=\"font-size:15px;font-weight:bold;color:#5a3a4a\">"+s.name+(isBaja?" <span style=\"font-size:10px;background:#eee;color:#999;padding:2px 6px;border-radius:8px\">BAJA</span>":"")+"</div>";
    if(freq&&time)h+="<div style=\"font-size:12px;color:#9a7080;margin-top:2px\">"+freq+" · "+time+"hs</div>";
    if(s.phone)h+="<div style=\"font-size:11px;color:#9a7080;margin-top:1px\">📱 "+s.phone+"</div>";
    if(s.startDate){var sd=new Date(s.startDate);var months=Math.floor((Date.now()-sd)/2592e6);h+="<div style=\"font-size:11px;color:#9a7080;margin-top:1px\">📅 Desde "+s.startDate+(months>0?" · "+months+" mes"+(months>1?"es":""):"")+"</div>";}
    if(!isBaja){if(p){var col=dl<0?"#e57373":dl<=5?"#e59040":"#7aab8a";h+="<div style=\"font-size:11px;color:"+col+";margin-top:2px\">"+(dl<0?"❗ Vencido "+Math.abs(dl)+"d":dl<=5?"⚠️ Vence en "+dl+"d":"✓ Vence "+p.dueDate)+"</div>";}else h+="<div style=\"font-size:11px;color:#e57373;margin-top:2px\">❗ Sin pago</div>";}
    h+="</div><div style=\"display:flex;flex-direction:column;gap:5px;align-items:flex-end\">";
    h+="<button onclick=\"openEditSt("+idx+")\" class=\"smb\" style=\"background:#9a8090\">✏️</button>";
    h+="<button onclick=\"openPayHistory("+idx+")\" class=\"smb\" style=\"background:#a0b4d4\">📋</button>";
    if(s.phone&&!isBaja)h+="<button onclick=\"openWA('"+s.phone+"','Hola '+students["+idx+"].name+'! 🌸')\" class=\"smb\" style=\"background:#25D366\">💬</button>";
    if(!isBaja)h+="<button onclick=\"openPay("+idx+")\" class=\"smb\" style=\"background:#7aab8a\">💰</button>";
    h+="</div></div></div>";
  });
  return h;
}

function rPagos(){
  // Students expiring today or in next 3 days
  var porVencer=students.filter(function(s){
    if(s.active===false)return false;
    var d=daysLeft(s.name);
    return d!==null&&d>=0&&d<=3;
  });
  var porVencerWA=porVencer.filter(function(s){return s.phone;});
  var h="";
  if(porVencer.length){
    h+="<div class=\"card\" style=\"margin-bottom:14px;background:rgba(255,183,77,0.1);border:1px solid rgba(255,183,77,0.4)\">";

    if(porVencerWA.length)h+="<button onclick=\"sendAllPorVencer()\" class=\"smb\" style=\"background:#ffb74d;color:#5a3a00\">📲 Avisar a todas</button>";

    porVencer.forEach(function(s){
      var d=daysLeft(s.name);
      var label=d===0?"⚠️ Vence HOY":"Vence en "+d+" día"+(d!==1?"s":"");
      var col=d===0?"#e57373":"#e59040";
      h+="<div style=\"display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-top:1px solid rgba(200,180,180,0.15)\">";
      h+="<span style=\"font-size:13px;color:#5a3a4a\">"+s.name+(s.phone?"":" · sin cel")+"</span>";
      h+="<span style=\"font-size:11px;font-weight:bold;color:"+col+"\">"+label+"</span>";
      h+="</div>";
    });
    h+="</div>";
  }
  h+="<div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px\">";
  var ov=students.filter(function(s){return s.active!==false&&payStatus(s.name)==="overdue";});
  var wn=students.filter(function(s){return s.active!==false&&payStatus(s.name)==="warning";});
  var ok=students.filter(function(s){return s.active!==false&&payStatus(s.name)==="ok";});
  var nn=students.filter(function(s){return s.active!==false&&payStatus(s.name)==="none";});
  [["#e57373",ov.length,"VENCIDO"],["#ffb74d",wn.length,"POR VCR"],["#7aab8a",ok.length,"AL DÍA"],["#bbb",nn.length,"SIN REG"]].forEach(function(x){
    h+="<div class=\"card\" style=\"text-align:center;padding:10px;border-top:3px solid "+x[0]+"\"><div style=\"font-size:22px;font-weight:bold;color:"+x[0]+"\">"+x[1]+"</div><div style=\"font-size:9px;color:#9a7080\">"+x[2]+"</div></div>";
  });
  h+="</div>";
  function payRow(s,bc){
    var i=students.indexOf(s);var p=getPay(s.name);
    var r="<div class=\"row\" style=\"margin-bottom:6px;border-left:4px solid "+bc+"\"><div style=\"flex:1\"><div style=\"font-size:14px;font-weight:bold;color:#5a3a4a\">"+s.name+"</div><div style=\"font-size:11px;color:#9a7080\">"+(p?"Pagó: "+p.paidDate+" · Vence: "+p.dueDate:"Sin pago")+"</div></div><div style=\"display:flex;gap:4px\">";
    r+="<button onclick=\"openPay("+i+")\" class=\"smb\" style=\"background:#7aab8a\">💰</button>";
    r+="<button onclick=\"sendDebt("+i+")\" class=\"smb\" style=\"background:#25D366\">📲</button>";
    r+="</div></div>";
    return r;
  }
  // Group by teacher
  // Month selector UI
  h+="<div class=\"card\" style=\"margin-bottom:16px\">";
  h+="<div style=\"font-size:11px;color:#9a7080;font-weight:bold;letter-spacing:1px;margin-bottom:8px\">📅 PERÍODO</div>";
  h+="<select onchange=\"selContableMes(this.value)\" style=\"margin-bottom:0\">";
  // Build months list
  var nowP=new Date();
  var currentYMP=nowP.getFullYear()+"-"+(String(nowP.getMonth()+1).padStart(2,"0"));
  var currentYM=currentYMP;
  if(!contableMes)contableMes=currentYMP;
  var tm=contableMes;
  var allMonths=[currentYMP];
  payments.forEach(function(p){if(p.paidDate){var ym=p.paidDate.substring(0,7);if(allMonths.indexOf(ym)<0)allMonths.push(ym);}});
  allMonths.sort().reverse();
  var mNamesP=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  function fmtMP(ym){var pts=ym.split("-");return mNamesP[parseInt(pts[1])-1]+" "+pts[0];}
  allMonths.forEach(function(ym){
    h+="<option value=\""+ym+"\""+( ym===tm?" selected":"")+">"+fmtMP(ym)+(ym===currentYM?" · mes actual":"")+"</option>";
  });
  h+="</select></div>";
  // Build chart data - last 6 months
  var chartMonths=[];
  for(var mi=5;mi>=0;mi--){
    var cd=new Date(nowP.getFullYear(),nowP.getMonth()-mi,1);
    chartMonths.push(cd.getFullYear()+"-"+(String(cd.getMonth()+1).padStart(2,"0")));
  }
  var chartTotals=chartMonths.map(function(ym){
    return payments.filter(function(p){return p.paidDate&&p.paidDate.startsWith(ym);}).reduce(function(a,p){return a+Number(p.monto||0);},0);
  });
  var maxVal=Math.max.apply(null,chartTotals)||1;
  var shortNames=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  h+="<div class=\"card\" style=\"margin-bottom:16px\">";

  h+="<div style=\"display:flex;align-items:flex-end;gap:8px;height:100px\">";
  chartMonths.forEach(function(ym,idx){
    var val=chartTotals[idx];
    var pct=val>0?Math.round(val/maxVal*100):2;
    var isCurrentMonth=ym===currentYM;
    var parts=ym.split("-");
    var label=shortNames[parseInt(parts[1])-1];
    h+="<div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:4px\">";

    h+="<div style=\"width:100%;background:"+(isCurrentMonth?"#d4809a":"#a5b4d4")+";border-radius:4px 4px 0 0;height:"+pct+"px;min-height:4px\"></div>";

    h+="</div>";
  });
  h+="</div></div>";
  var colors={Anabella:"#d4a5a5",Maia:"#a5b4d4","Rocío":"#a5d4b4",Antonela:"#d4cca5",Iara:"#c4a5d4"};
  Object.keys(TEACHERS).forEach(function(teacher){
    var teacherStudents=students.filter(function(s){
      if(s.active===false)return false;
      var myCls=classes.filter(function(c){return c.enrolled.indexOf(s.name)>=0;});
      return myCls.length>0&&myCls[0].teacher===teacher;
    });
    if(!teacherStudents.length)return;
    var tovL=teacherStudents.filter(function(s){return payStatus(s.name)==="overdue";});
    var twnL=teacherStudents.filter(function(s){return payStatus(s.name)==="warning";});
    var tokL=teacherStudents.filter(function(s){return payStatus(s.name)==="ok";});
    var tnnL=teacherStudents.filter(function(s){return payStatus(s.name)==="none";});
    h+="<div style=\"background:"+(colors[teacher]||"#ddd")+";padding:8px 14px;border-radius:10px 10px 0 0;font-size:12px;font-weight:bold;color:#5a3a4a;margin-top:16px\">👩‍🏫 "+teacher+" ("+teacherStudents.length+" alumnas)</div>";
    h+="<div style=\"border:1px solid rgba(200,180,180,0.3);border-radius:0 10px 10px 10px;padding:10px;margin-bottom:8px\">";
    if(tovL.length){h+="<div style=\"font-size:10px;color:#c06060;font-weight:bold;margin-bottom:6px\">❗ VENCIDOS</div>";tovL.forEach(function(s){h+=payRow(s,"#e57373");});}
    if(twnL.length){h+="<div style=\"font-size:10px;color:#e59040;font-weight:bold;margin:8px 0 6px\">⚠️ POR VENCER</div>";twnL.forEach(function(s){h+=payRow(s,"#ffb74d");});}
    if(tokL.length){h+="<div style=\"font-size:10px;color:#7aab8a;font-weight:bold;margin:8px 0 6px\">✓ AL DÍA</div>";tokL.forEach(function(s){h+=payRow(s,"#a5d4b4");});}
    if(tnnL.length){h+="<div style=\"font-size:10px;color:#bbb;font-weight:bold;margin:8px 0 6px\">SIN REGISTRAR</div>";tnnL.forEach(function(s){h+=payRow(s,"#ddd");});}
    h+="</div>";
  });
  // Students without a class assigned
  var sinProfe=students.filter(function(s){
    if(s.active===false)return false;
    var myCls=classes.filter(function(c){return c.enrolled.indexOf(s.name)>=0;});
    return myCls.length===0;
  });
  if(sinProfe.length){
    h+="<div style=\"background:#eee;padding:8px 14px;border-radius:10px 10px 0 0;font-size:12px;font-weight:bold;color:#9a7080;margin-top:16px\">Sin horario asignado ("+sinProfe.length+")</div>";
    h+="<div style=\"border:1px solid rgba(200,180,180,0.3);border-radius:0 10px 10px 10px;padding:10px;margin-bottom:8px\">";
    sinProfe.forEach(function(s){h+=payRow(s,"#ddd");});
    h+="</div>";
  }
  return h;
}

function sendLiq(name){
  var phone=TEACHERS[name];if(!phone)return;
  var now=new Date();var tm=now.getFullYear()+"-"+(String(now.getMonth()+1).padStart(2,"0"));
  var ptm=payments.filter(function(p){return p.paidDate&&p.paidDate.startsWith(tm);});

  students.filter(function(s){return s.active!==false;}).forEach(function(s){
    var myCls=classes.filter(function(c){return c.enrolled.indexOf(s.name)>=0;});
    if(!myCls.length||myCls[0].teacher!==name)return;
    var pay=ptm.find(function(p){return p.name===s.name;});

  openWA(phone,m);
}

    h+="<div class=\"row\" style=\"margin-bottom:6px\"><div style=\"flex:1\"><span style=\"font-weight:bold;color:#5a3a4a\">"+a.studentName+"</span><span style=\"color:#aaa;margin-left:8px;font-size:12px\">falta a "+(cls?cls.day+" "+cls.time+"hs":"clase eliminada")+"</span></div><button onclick=\"rmAbsence("+i+")\" style=\"background:none;border:none;color:#e57373;cursor:pointer;font-size:16px\">✕</button></div>";
  });
  if(waitlist.length){
    h+="<div style=\"font-size:11px;color:#9a7080;font-weight:bold;letter-spacing:1.5px;margin:16px 0 10px\">⏳ LISTA DE ESPERA</div>";
    waitlist.forEach(function(w,i){
      h+="<div class=\"row\" style=\"margin-bottom:6px;border-left:4px solid #d4cca5\"><div style=\"flex:1\"><span style=\"font-weight:bold;color:#5a3a4a\">"+w.name+"</span><span style=\"color:#aaa;margin-left:8px;font-size:12px\">espera en "+w.day+" "+w.time+"hs</span></div><button onclick=\"waitlist.splice("+i+",1);saveWL();render()\" style=\"background:none;border:none;color:#e57373;cursor:pointer;font-size:16px\">✕</button></div>";
    });
  }
  return h;
}

function rProfes(){
  var colors=["#d4a5a5","#a5b4d4","#a5d4b4","#d4cca5","#c4a5d4","#d4b4a5","#b4d4a5"];
  var tnames=Object.keys(TEACHERS);
  var h="<div style=\"font-size:11px;color:#9a7080;letter-spacing:1.5px;margin-bottom:12px;font-weight:bold\">👩‍🏫 PROFES</div>";
  h+="<button onclick=\"openEditProfe('')\" style=\"width:100%;padding:12px;background:linear-gradient(135deg,#7aab8a,#5a9a7a);border:none;color:white;border-radius:12px;font-size:14px;cursor:pointer;font-family:Georgia,serif;margin-bottom:14px\">+ Agregar nueva profe</button>";
  tnames.forEach(function(name,idx){
    var phone=TEACHERS[name];
    var info=TEACHER_INFO[name]||{};
    var col=colors[idx%colors.length];
    var myCls=classes.filter(function(c){return c.teacher===name;});
    var days=[].concat(myCls.map(function(c){return c.day;})).filter(function(v,i,a){return a.indexOf(v)===i;});
    h+="<div class=\"card\" style=\"margin-bottom:10px;border-left:4px solid "+col+"\">";
    h+="<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:8px\">";
    h+="<div style=\"font-weight:bold;color:#5a3a4a;font-size:15px\">"+name+"</div>";
    h+="<div style=\"display:flex;gap:6px\">";
    h+="<button onclick=\"openEditProfe('"+name+"')\" class=\"smb\" style=\"background:#9a8090\">✏️</button>";
    h+="<button onclick=\"waProfe('"+name+"')\" class=\"smb\" style=\"background:#25D366\">💬</button>";
    h+="<button onclick=\"deleteProfe('"+name+"')\" class=\"smb\" style=\"background:#e57373\">🗑️</button>";
    h+="</div></div>";
    h+="<div style=\"font-size:12px;color:#9a7080\">📱 +"+phone+"</div>";
    if(info.dni)h+="<div style=\"font-size:12px;color:#9a7080;margin-top:3px\">🪪 DNI: "+info.dni+"</div>";
    if(info.birthdate)h+="<div style=\"font-size:12px;color:#9a7080;margin-top:3px\">🎂 "+info.birthdate+"</div>";
    if(info.email)h+="<div style=\"font-size:12px;color:#9a7080;margin-top:3px\">✉️ "+info.email+"</div>";
    if(myCls.length){
      var schedule=[];
      days.forEach(function(d){
        var times=myCls.filter(function(c){return c.day===d;}).map(function(c){return c.time+"hs";}).join(", ");
        schedule.push(d+": "+times);
      });
      h+="<div style=\"font-size:12px;color:#9a7080;margin-top:6px;border-top:1px solid rgba(200,180,180,0.2);padding-top:6px\">";
      h+="<div style=\"font-size:10px;color:#9a7080;letter-spacing:1px;font-weight:bold;margin-bottom:4px\">📅 HORARIOS</div>";
      schedule.forEach(function(s){h+="<div style=\"font-size:12px;color:#7a5a6a\">"+s+"</div>";});
      h+="</div>";
    }
    h+="</div>";
  });
  return h;
}
function openPayHistory(idx){
  var s=students[idx];
  var hist=payments.filter(function(p){return p.name===s.name;}).sort(function(a,b){return b.paidDate.localeCompare(a.paidDate);});
  var mNames=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  var h="<div style=\"font-size:16px;font-weight:bold;color:#5a3a4a;margin-bottom:4px\">📋 Historial de pagos</div>";
  h+="<div style=\"font-size:13px;color:#9a7080;margin-bottom:16px\">"+s.name+"</div>";
  if(s.startDate){
    var sd=new Date(s.startDate);
    var months=Math.floor((Date.now()-sd)/2592e6);
    h+="<div style=\"background:rgba(212,128,154,0.1);border-radius:10px;padding:10px 14px;margin-bottom:14px\">";
    h+="<div style=\"font-size:12px;color:#9a7080\">📅 Alumna desde</div>";
    h+="<div style=\"font-size:15px;font-weight:bold;color:#7a4a5a\">"+s.startDate+"</div>";
    h+="<div style=\"font-size:12px;color:#9a7080\">"+months+" mes"+(months!==1?"es":"")+" en el estudio</div>";
    h+="</div>";
  }
  if(!hist.length){
    h+="<div style=\"text-align:center;color:#bbb;font-size:13px;padding:20px\">Sin pagos registrados 🌸</div>";
  } else {
    var total=hist.reduce(function(a,p){return a+Number(p.monto||0);},0);
    h+="<div style=\"font-size:11px;color:#9a7080;margin-bottom:10px\">Total histórico: <b>$"+total.toLocaleString("es-AR")+"</b> · "+hist.length+" pagos</div>";
    hist.forEach(function(p){
      var method=p.method==="tr"?"📲 Transf.":"💵 Efectivo";
      var ym=p.paidDate?p.paidDate.substring(0,7):"";
      var parts=ym.split("-");
      var mesNombre=parts.length>1?mNames[parseInt(parts[1])-1]+" "+parts[0]:p.paidDate;
      h+="<div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(200,180,180,0.15)\">";
      h+="<div><div style=\"font-size:13px;font-weight:bold;color:#5a3a4a\">"+mesNombre+"</div>";
      h+="<div style=\"font-size:11px;color:#9a7080\">"+method+" · Vence: "+p.dueDate+"</div></div>";
      h+="<div style=\"font-size:15px;font-weight:bold;color:#7aab8a\">$"+Number(p.monto||0).toLocaleString("es-AR")+"</div>";
      h+="</div>";
    });
  }
  h+="<button onclick=\"closeModal()\" style=\"width:100%;padding:10px;background:none;border:none;color:#9a7080;cursor:pointer;font-family:Georgia,serif;margin-top:14px\">Cerrar</button>";
  showModal(h);
}
function waProfe(n){openWA(TEACHERS[n],'Hola '+n+'! 🌸');}
function openEditProfe(name){
  var isNew=!name;
  var phone=isNew?"":TEACHERS[name]||"";
  var info=isNew?{dni:"",birthdate:"",email:""}:(TEACHER_INFO[name]||{});
  var myCls=isNew?[]:classes.filter(function(c){return c.teacher===name;});
  var ALL_TIMES=["07:00","08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00","21:00"];
  var h="<div style=\"font-size:16px;font-weight:bold;color:#5a3a4a;margin-bottom:14px\">"+(isNew?"➕ Nueva profe":"✏️ Editar: "+name)+"</div>";
  h+="<label>Nombre</label><input id=\"pen\" value=\""+name+"\">";
  h+="<label>Celular</label><input id=\"pph\" value=\""+phone+"\" placeholder=\"5493XXXXXXXXX\" type=\"tel\">";
  h+="<label>DNI</label><input id=\"pdn\" value=\""+(info.dni||"")+"\" placeholder=\"DNI\">";
  h+="<label>Fecha de nacimiento</label><input type=\"date\" id=\"pbd\" value=\""+(info.birthdate||"")+"\">";
  h+="<label>Email</label><input id=\"pem\" value=\""+(info.email||"")+"\" placeholder=\"email@ejemplo.com\" type=\"email\">";
  h+="<div style=\"font-size:12px;color:#9a7080;font-weight:bold;letter-spacing:1px;margin:12px 0 8px\">📅 HORARIOS POR DÍA</div>";
  h+="<div style=\"font-size:11px;color:#9a7080;margin-bottom:10px\">Seleccioná los días y horarios que trabaja</div>";
  ALL_DAYS.forEach(function(day){
    if(day==="Sábado")return;
    var dayTimes=myCls.filter(function(c){return c.day===day;}).map(function(c){return c.time;});
    h+="<div style=\"margin-bottom:10px;background:rgba(255,255,255,0.6);border-radius:10px;padding:10px;border:1px solid rgba(200,180,180,0.2)\">";
    h+="<div style=\"font-size:12px;font-weight:bold;color:#5a3a4a;margin-bottom:6px;display:flex;align-items:center;gap:8px\">";
    h+="<span style=\"display:inline-block;width:10px;height:10px;border-radius:50%;background:"+DAY_COLORS[day]+"\">&nbsp;</span>"+day+"</div>";
    h+="<div style=\"display:flex;flex-wrap:wrap;gap:6px\">";
    ALL_TIMES.forEach(function(t){
      var on=dayTimes.indexOf(t)>=0;
      h+="<button onclick=\"togglePT('"+day+"','"+t+"')\" id=\"pt_"+day+"_"+t.replace(":","_")+"\" style=\"padding:4px 10px;border-radius:8px;font-size:12px;font-family:Georgia,serif;cursor:pointer;border:1px solid "+(on?"#d4809a":"rgba(200,180,180,0.3)")+";background:"+(on?"rgba(212,128,154,0.15)":"rgba(255,255,255,0.8)")+";color:"+(on?"#b0506a":"#7a5a6a")+"\">"+t+"</button>";
    });
    h+="</div></div>";
  });
  h+="<button onclick=\"saveProfe('"+name+"')\" class=\"pbtn\" style=\"background:linear-gradient(135deg,#d4809a,#e0a0b5);margin-top:6px\">Guardar ✓</button>";
  h+="<button onclick=\"closeModal()\" style=\"width:100%;padding:10px;background:none;border:none;color:#9a7080;cursor:pointer;font-family:Georgia,serif;margin-top:6px\">Cancelar</button>";
  showModal(h);
}
function togglePT(day,time){
  var id="pt_"+day+"_"+time.replace(":","_");
  var btn=document.getElementById(id);
  if(!btn)return;
  var on=btn.style.borderColor==="rgb(212, 128, 154)";
  btn.style.borderColor=on?"rgba(200,180,180,0.3)":"#d4809a";
  btn.style.background=on?"rgba(255,255,255,0.8)":"rgba(212,128,154,0.15)";
  btn.style.color=on?"#7a5a6a":"#b0506a";
}


function saveProfe(oldName){
  var name=document.getElementById("pen").value.trim();
  var phone=document.getElementById("pph").value.trim();
  if(!name||!phone)return notif("Completá nombre y celular","error");
  var isNew=!oldName;
  // Collect selected day/time slots
  var ALL_TIMES=["07:00","08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00","21:00"];
  var newSlots=[];
  ALL_DAYS.forEach(function(day){
    if(day==="Sábado")return;
    ALL_TIMES.forEach(function(t){
      var btn=document.getElementById("pt_"+day+"_"+t.replace(":","_"));
      if(btn&&btn.style.borderColor==="rgb(212, 128, 154)")newSlots.push({day:day,time:t});
    });
  });
  // Handle rename
  if(!isNew&&oldName!==name){
    delete TEACHERS[oldName];
    if(TEACHER_INFO[oldName]){TEACHER_INFO[name]=TEACHER_INFO[oldName];delete TEACHER_INFO[oldName];}
    classes=classes.map(function(c){return c.teacher===oldName?Object.assign({},c,{teacher:name}):c;});
  }
  TEACHERS[name]=phone;
  if(!TEACHER_INFO[name])TEACHER_INFO[name]={};
  TEACHER_INFO[name].dni=document.getElementById("pdn").value.trim();
  TEACHER_INFO[name].birthdate=document.getElementById("pbd").value;
  TEACHER_INFO[name].email=document.getElementById("pem").value.trim();
  // Remove old classes for this teacher, add new ones (keeping enrolled students)
  var oldCls=classes.filter(function(c){return c.teacher===name;});
  // Remove slots that are no longer selected
  classes=classes.filter(function(c){
    if(c.teacher!==name)return true;
    return newSlots.some(function(s){return s.day===c.day&&s.time===c.time;});
  });
  // Add new slots that don't exist yet
  newSlots.forEach(function(s){
    var exists=classes.find(function(c){return c.teacher===name&&c.day===s.day&&c.time===s.time;});
    if(!exists)classes.push({id:Date.now()+Math.random(),day:s.day,time:s.time,teacher:name,spots:10,enrolled:[]});
  });
  saveC();saveTI();saveTeachers();
  closeModal();
  notif("✓ "+(isNew?"Profe agregada":"Guardado"));
  render();
}

function deleteProfe(name){
  if(!confirm("¿Eliminar a "+name+"? Se van a eliminar todas sus clases."))return;
  delete TEACHERS[name];
  delete TEACHER_INFO[name];
  classes=classes.filter(function(c){return c.teacher!==name;});
  saveC();saveTI();saveTeachers();
  notif("Profe eliminada");render();
}

function chkAlumnaPass(){
  var v=document.getElementById("api").value.trim();
  var found=students.find(function(s){return s.active!==false&&s.dni&&s.dni.replace(/\s/g,"")===v;});
  if(found){
    alumnaName=found.name;
    closeModal();
    if(payStatus(found.name)==="overdue"){
      showOverdueAlumna(found.name);
    } else {
      render();
    }
  } else {
    var pe=document.getElementById("ape");
    if(pe)pe.style.display="block";
  }
}
function showOverdueAlumna(name){
  var p=getPay(name);
  var h="<div style=\"font-size:32px;text-align:center;margin-bottom:10px\">⚠️</div>";
  h+="<div style=\"font-size:16px;font-weight:bold;color:#c06060;margin-bottom:8px;text-align:center\">Cuota vencida</div>";
  h+="<div style=\"font-size:13px;color:#9a7080;text-align:center;margin-bottom:20px\">Hola <b>"+name+"</b>! Tu cuota"+(p&&p.dueDate?" venció el "+p.dueDate:"")+" está pendiente. Podés avisar que faltás, pero no podés recuperar clases hasta pagar.</div>";
  h+="<button onclick=\"closeModal();render()\" class=\"pbtn\" style=\"background:linear-gradient(135deg,#d4809a,#e0a0b5)\">Entendido, continuar</button>";
  h+="<button onclick=\"closeModal();goPagar();render()\" class=\"pbtn\" style=\"background:linear-gradient(135deg,#7aab8a,#5a9a7a);margin-top:6px\">💳 Pagar mi cuota</button>";
  showModal(h);
}
