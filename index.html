const sendWhatsApp = (teacherName, studentName, classDay, classTime, type="absence") => {
  const phone = TEACHERS[teacherName];
  if (!phone) return;
  const msg = type === "absence"
    ? `🌸 *${STUDIO_NAME}*\n\nHola ${teacherName}! Te aviso que *${studentName}* no va a poder ir a tu clase del *${classDay} a las ${classTime}hs*.\n\nSu lugar quedó disponible para otra alumna. 🧘‍♀️`
    : `🌸 *${STUDIO_NAME}*\n\nHola ${teacherName}! *${studentName}* se anotó en tu clase del *${classDay} a las ${classTime}hs*. 🧘‍♀️`;
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, "_blank");
};

function AdminStudents({ students, onUpdate }) {
  const [newName, setNewName] = useState("");
  const [editIdx, setEditIdx] = useState(null);
  const [editVal, setEditVal] = useState("");
  const add = () => { const n=newName.trim(); if(!n||students.includes(n))return; onUpdate([...students,n].sort()); setNewName(""); };
  const remove = (n) => onUpdate(students.filter(s=>s!==n));
  const saveEdit = (old) => { const n=editVal.trim(); if(!n||(students.includes(n)&&n!==old))return; onUpdate(students.map(s=>s===old?n:s).sort()); setEditIdx(null); };
  return (
    <div>
      <div style={sectionTitle}>👩‍🎓 Alumnas ({students.length})</div>
      <div style={{ display:"flex",gap:8,marginBottom:16 }}>
        <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Nombre de nueva alumna..." style={{ ...inputStyle,flex:1 }} />
        <button onClick={add} style={smallBtn("#7aab8a")}>+ Agregar</button>
      </div>
      <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
        {students.map((s,i)=>(
          <div key={s} style={listRow}>
            {editIdx===i ? (
              <><input value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveEdit(s)} style={{ ...inputStyle,flex:1,padding:"8px 12px",fontSize:14 }} autoFocus />
              <button onClick={()=>saveEdit(s)} style={smallBtn("#7aab8a")}>✓</button>
              <button onClick={()=>setEditIdx(null)} style={smallBtn("#aaa")}>✕</button></>
            ) : (
              <><span style={{ flex:1,fontSize:14,color:"#5a3a4a" }}>{s}</span>
              <button onClick={()=>{setEditIdx(i);setEditVal(s);}} style={iconBtn}>✏️</button>
              <button onClick={()=>remove(s)} style={iconBtn}>🗑️</button></>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function AdminClasses({ classes, students, onUpdate }) {
  const [newClass, setNewClass] = useState({ day:"Lunes",time:"09:00",teacher:"Anabella",spots:10 });

  const [editingId, setEditingId] = useState(null);

function PilatesApp() {
  const [loaded, setLoaded]     = useState(false);
  const [saving, setSaving]     = useState(false);
  const [classes, setClasses]   = useState(DEFAULT_CLASSES);
  const [students, setStudents] = useState(DEFAULT_STUDENTS);
  const [absences, setAbsences] = useState([]);
  const [view, setView]         = useState("home");
  const [adminTab, setAdminTab] = useState("clases");
  const [selectedClass, setSelectedClass]   = useState(null);
  const [selectedStudent, setSelectedStudent] = useState("");
  const [joinStudent, setJoinStudent] = useState("");
  const [joinName, setJoinName]       = useState("");
  const [notification, setNotification] = useState(null);
  const [scheduleDay, setScheduleDay]   = useState("Lunes");

  // Load from Firebase on mount
  useEffect(() => {
    const classesRef = db.ref('classes');
    const studentsRef = db.ref('students');
    const absencesRef = db.ref('absences');
    let loadedCount = 0;
    const checkDone = () => { loadedCount++; if(loadedCount===3) setLoaded(true); };
    classesRef.once('value').then(snap => { if(snap.val()) setClasses(snap.val()); checkDone(); });
    studentsRef.once('value').then(snap => { if(snap.val()) setStudents(snap.val()); checkDone(); });
    absencesRef.once('value').then(snap => { if(snap.val()) setAbsences(snap.val()); checkDone(); });
  }, []);

  const persist = useCallback(async (key, value) => {
    setSaving(true);
    try { await db.ref(key).set(value); } catch(e) { console.error(e); }
    setTimeout(()=>setSaving(false), 800);
  }, []);

  const updateClasses  = useCallback((val) => { const next=typeof val==="function"?val(classes):val;  setClasses(next);  persist("classes",next);  }, [classes,persist]);
  const updateStudents = useCallback((val) => { const next=typeof val==="function"?val(students):val; setStudents(next); persist("students",next); }, [students,persist]);
  const updateAbsences = useCallback((val) => { const next=typeof val==="function"?val(absences):val; setAbsences(next); persist("absences",next); }, [absences,persist]);

  const showNotif = (msg, type="success") => { setNotification({msg,type}); setTimeout(()=>setNotification(null),3000); };
  const getAbsentsForClass = (id) => absences.filter(a=>a.classId===id).map(a=>a.studentName);
  const availableClasses = classes.filter(c => getAbsentsForClass(c.id).length+(c.spots-c.enrolled.length)>0);

  const handleAbsence = () => {
    if(!selectedClass||!selectedStudent) return showNotif("Completá todos los campos","error");
    const cls=classes.find(c=>c.id===selectedClass);
    if(!cls.enrolled.includes(selectedStudent)) return showNotif("No estás inscripta en esa clase","error");
    if(absences.find(a=>a.classId===selectedClass&&a.studentName===selectedStudent)) return showNotif("Ya avisaste tu falta","error");
