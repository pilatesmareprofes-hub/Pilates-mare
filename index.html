    if (!selectedClass || !selectedStudent) return showNotif('Completá todos los campos', 'error');

    if (!cls.enrolled.includes(selectedStudent)) return showNotif('No estás inscripta en esa clase', 'error');

    saveAbsences();
    showNotif('¡Listo! Tu lugar en ' + cls.day + ' ' + cls.time + 'hs quedó disponible 🌸');
    sendWA(cls.teacher, selectedStudent, cls.day, cls.time, 'absence');
    showView('home');
  }

  function confirmJoin() {
    const name = joinStudent || joinName.trim();
    if (!selectedClass || !name) return showNotif('Completá todos los campos', 'error');
    const cls = classes.find(c => c.id == selectedClass);
    if (freeSpots(cls) <= 0) return showNotif('No hay lugares disponibles', 'error');
    if (cls.enrolled.includes(name)) return showNotif('Ya estás inscripta en esa clase', 'error');
    classes = classes.map(c => c.id == selectedClass ? {...c, enrolled: [...c.enrolled, name]} : c);
    const toRemove = absences.find(a => a.classId == selectedClass);
    if (toRemove) absences = absences.filter(a => !(a.classId == selectedClass && a.studentName === toRemove.studentName));
    saveClasses(); saveAbsences();
    showNotif('¡Genial! Te sumaste a ' + cls.day + ' ' + cls.time + 'hs 🎉');
    sendWA(cls.teacher, name, cls.day, cls.time, 'join');
    showView('home');
  }

      return {...c, enrolled};
    });
    saveClasses(); render();
  }

    if (!p) return 999;
    const diff = Date.now() - new Date(p.date).getTime();
    return Math.floor(diff / (1000*60*60*24));
  }

    // Send to student via profe? We send to profe with student name
    const msg = '🌸 *Pilates Mare*\n\nHola ' + name + '! Te recordamos que tenés el pago del mes pendiente. \n\nCualquier consulta escribinos 🙏';

  function getStudentClasses(name) {
    return classes.filter(c => c.enrolled.includes(name));
  }
  function enrollStudentInSchedule(name, freq, time) {
    const days = freq === '3' ? ['Lunes','Miércoles','Viernes'] : ['Martes','Jueves'];
    classes = classes.map(c => {
      if (days.includes(c.day) && c.time === time) {
        if (!c.enrolled.includes(name)) return {...c, enrolled: [...c.enrolled, name]};
      }
      return c;
    });
    saveClasses();
  }
  function unenrollStudentAll(name) {
    classes = classes.map(c => ({...c, enrolled: c.enrolled.filter(e => e !== name)}));
    saveClasses();
  }
  function changeStudentSchedule(name, val) {
    if (!val) return;
    const [freq, time] = val.split('|');
    unenrollStudentAll(name);
    enrollStudentInSchedule(name, freq, time);
    showNotif('✓ Horario actualizado para ' + name);
    render();
  }
  function addStudentWithSchedule() {
    const name = document.getElementById('new-student').value.trim();
    const freq = document.getElementById('new-freq').value;
    const time = document.getElementById('new-time').value;
    if (!name) return showNotif('Escribí el nombre de la alumna', 'error');
    if (students.includes(name)) return showNotif('Esa alumna ya existe', 'error');
    students = [...students, name].sort();
    saveStudents();
    if (freq && time) enrollStudentInSchedule(name, freq, time);
    saveClasses();
    showNotif('✓ ' + name + ' agregada' + (freq && time ? ' en clases de ' + time + 'hs' : ''));
    render();
  }
  function addStudent() { addStudentWithSchedule(); }

  function addClass() {
    const day = document.getElementById('nc-day').value;
    const time = document.getElementById('nc-time').value;
    const teacher = document.getElementById('nc-teacher').value;
    const spots = parseInt(document.getElementById('nc-spots').value) || 10;
    const id = Date.now();
    classes = [...classes, {id, day, time, teacher, spots, enrolled:[]}];
    saveClasses(); render();
  }

  function sendDebtWA(name) {
    const msg = '🌸 *Pilates Mare*\n\nHola ' + name + '! 😊 Te recordamos que tenés el pago del mes pendiente.\n\nCualquier consulta escribinos. ¡Gracias! 🙏';
    window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
  }

    html += '<div class="card" style="text-align:center;border-top:3px solid #e57373"><div style="font-size:28px;font-weight:bold;color:#e57373">' + overdue.length + '</div><div style="font-size:11px;color:#9a7080;letter-spacing:1px">DEBEN</div></div>';
    html += '<div class="card" style="text-align:center;border-top:3px solid #ffb74d"><div style="font-size:28px;font-weight:bold;color:#ffb74d">' + warning.length + '</div><div style="font-size:11px;color:#9a7080;letter-spacing:1px">POR VENCER</div></div>';
    html += '<div class="card" style="text-align:center;border-top:3px solid #7aab8a"><div style="font-size:28px;font-weight:bold;color:#7aab8a">' + ok.length + '</div><div style="font-size:11px;color:#9a7080;letter-spacing:1px">AL DÍA</div></div>';
    html += '</div>';

    if (overdue.length > 0) {
      html += '<div style="font-size:12px;color:#c06060;letter-spacing:1px;margin-bottom:10px;font-weight:bold">❗ DEBEN ESTE MES</div>';
      overdue.forEach(s => {
        const d = daysSincePaid(s);
        const safe_s = s.replace(/'/g, "\'");
        html += '<div class="row" style="margin-bottom:6px;border-left:4px solid #e57373">';
        html += '<div style="flex:1"><div style="font-size:14px;font-weight:bold;color:#5a3a4a">' + s + '</div>';
        html += '<div style="font-size:12px;color:#e57373">' + (d===999?'Sin pago registrado':'Hace '+d+' días') + '</div></div>';
        html += '<div style="display:flex;gap:4px">';
        html += '<button onclick="registerPayment('' + safe_s + '')" style="background:#7aab8a;border:none;color:white;padding:5px 10px;border-radius:8px;font-size:12px;cursor:pointer;font-family:Georgia,serif">💰 Pagó</button>';
        html += '<button onclick="sendDebtWA('' + safe_s + '')" style="background:#25D366;border:none;color:white;padding:5px 10px;border-radius:8px;font-size:12px;cursor:pointer;font-family:Georgia,serif">📲 Cobrar</button>';
        html += '</div></div>';
      });
    }

    if (warning.length > 0) {
      html += '<div style="font-size:12px;color:#e59040;letter-spacing:1px;margin:16px 0 10px;font-weight:bold">⚠️ VENCEN PRONTO</div>';
      warning.forEach(s => {
        const d = daysSincePaid(s);
        const safe_s = s.replace(/'/g, "\'");
        html += '<div class="row" style="margin-bottom:6px;border-left:4px solid #ffb74d">';
        html += '<div style="flex:1"><div style="font-size:14px;font-weight:bold;color:#5a3a4a">' + s + '</div>';
        html += '<div style="font-size:12px;color:#e59040">Hace ' + d + ' días — vence en ' + (30-d) + ' días</div></div>';
        html += '<button onclick="registerPayment('' + safe_s + '')" style="background:#7aab8a;border:none;color:white;padding:5px 10px;border-radius:8px;font-size:12px;cursor:pointer;font-family:Georgia,serif">💰 Pagó</button>';
        html += '</div>';
      });
    }

    if (ok.length > 0) {
      html += '<div style="font-size:12px;color:#7aab8a;letter-spacing:1px;margin:16px 0 10px;font-weight:bold">✓ AL DÍA</div>';
      ok.forEach(s => {
        const d = daysSincePaid(s);
        const safe_s = s.replace(/'/g, "\'");
        html += '<div class="row" style="margin-bottom:6px;border-left:4px solid #a5d4b4">';
        html += '<div style="flex:1"><div style="font-size:14px;color:#5a3a4a">' + s + '</div>';
        html += '<div style="font-size:12px;color:#7aab8a">Pagó hace ' + d + ' días</div></div>';
        html += '<button onclick="registerPayment('' + safe_s + '')" style="background:rgba(122,171,138,0.2);border:1px solid rgba(122,171,138,0.3);color:#5a8a6a;padding:5px 10px;border-radius:8px;font-size:12px;cursor:pointer;font-family:Georgia,serif">💰 Renovar</button>';
        html += '</div>';
      });
    }
    return html;
  }

  function renderAdminProfes() {
    const colors = {Anabella:"#d4a5a5",Maia:"#a5b4d4","Rocío":"#a5d4b4",Antonela:"#d4cca5",Iara:"#c4a5d4"};
    let html = '<div style="font-size:12px;color:#9a7080;letter-spacing:1.5px;margin-bottom:16px;font-weight:bold">👩‍🏫 PROFES Y WHATSAPP</div>';
    Object.entries(TEACHERS).forEach(([name, phone]) => {
      html += '<div class="row" style="margin-bottom:10px;border-left:4px solid ' + (colors[name]||'#ccc') + '">';
      html += '<div style="flex:1"><div style="font-weight:bold;color:#5a3a4a;font-size:15px">' + name + '</div>';
      html += '<div style="font-size:12px;color:#9a8080;margin-top:2px">+' + phone + '</div></div>';
      html += '<button onclick="window.open(\'https://wa.me/' + phone + '\',\'_blank\')" style="background:' + (colors[name]||'#ccc') + ';border:none;color:#5a3a4a;padding:8px 14px;border-radius:10px;font-size:13px;cursor:pointer;font-family:Georgia,serif">💬 WhatsApp</button>';
      html += '</div>';
    });
    return html;
  }
  </script>
