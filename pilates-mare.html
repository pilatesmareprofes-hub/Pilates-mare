<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Pilates Mare</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:linear-gradient(135deg,#fdf6f0,#f5e6e8,#e8f0f5);min-height:100vh;color:#3a2a3a}
#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:10px}
.hdr{background:rgba(255,255,255,0.85);border-bottom:1px solid rgba(200,180,180,0.3);padding:12px 20px;position:sticky;top:0;z-index:100;display:none;align-items:center;justify-content:space-between}
.wrap{max-width:600px;margin:0 auto;padding:16px;display:none}
.card{background:rgba(255,255,255,0.82);border:1px solid rgba(200,180,180,0.2);border-radius:16px;padding:16px;margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.bigbtn{border:none;border-radius:18px;padding:24px 16px;cursor:pointer;text-align:left;color:white;width:100%;font-family:Georgia,serif}
input,select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(200,180,180,0.3);background:rgba(255,255,255,0.9);font-size:14px;font-family:Georgia,serif;color:#5a3a4a;outline:none;margin-bottom:8px}
label{display:block;font-size:11px;color:#9a7080;letter-spacing:1px;margin-bottom:5px;margin-top:6px}
.pbtn{width:100%;padding:14px;color:white;border:none;border-radius:14px;font-size:15px;font-family:Georgia,serif;cursor:pointer;margin-top:6px}
.bbtn{background:none;border:none;color:#9a7080;cursor:pointer;font-size:13px;margin-bottom:16px;padding:0;font-family:Georgia,serif}
.badge{padding:3px 10px;border-radius:16px;font-size:11px}
.bg{background:#7aab8a;color:white}
.bo{background:rgba(122,171,138,0.15);color:#5a8a6a;border:1px solid rgba(122,171,138,0.3)}
.br{background:rgba(200,100,100,0.1);color:#c06060;border:1px solid rgba(200,100,100,0.2)}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:6px 12px;border-radius:16px;border:1px solid rgba(200,180,180,0.3);font-size:12px;cursor:pointer;font-family:Georgia,serif;background:rgba(255,255,255,0.7);color:#7a5a6a}
.tab.on{color:white}
.notif{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:24px;color:white;font-size:13px;font-family:Georgia,serif;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.15);display:none}
.row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.82);border-radius:12px;padding:10px 12px;border:1px solid rgba(200,180,180,0.2);margin-bottom:6px}
.clsbtn{width:100%;padding:12px 14px;margin-bottom:7px;border-radius:12px;border:1px solid rgba(200,180,180,0.3);background:rgba(255,255,255,0.8);color:#5a3a4a;cursor:pointer;text-align:left;font-family:Georgia,serif;display:flex;justify-content:space-between;align-items:center}
.clsbtn.sel{border:2px solid #d4809a;background:rgba(212,128,154,0.1)}
.jbtn{width:100%;padding:14px;margin-bottom:8px;border-radius:12px;border:1px solid rgba(180,200,220,0.4);background:rgba(255,255,255,0.8);cursor:pointer;text-align:left;font-family:Georgia,serif;display:flex;justify-content:space-between;align-items:center}
.jbtn.sel{border:2px solid #8ab8d8;background:rgba(138,184,216,0.1)}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mbox{background:#fff;border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto}
.smb{padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;font-family:Georgia,serif;border:none;color:white}
.itag{padding:3px 10px;border-radius:16px;font-size:11px;cursor:pointer;font-family:Georgia,serif;margin:2px;border:1px solid rgba(200,180,180,0.3);background:rgba(240,240,240,0.5);color:#9a8090;display:inline-block}
.itag.on{background:rgba(212,128,154,0.15);color:#b0506a;border-color:#d4809a}
</style>
</head>

function toArr(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val.filter(function(x){return x!=null;});
  if (typeof val === "object") return Object.values(val).filter(function(x){return x!=null;});
  return [];
}
function fixClass(c) {
  if (!c || typeof c !== "object") return null;
  return {
    id: c.id || Date.now(),
    day: c.day || "Lunes",
    time: c.time || "09:00",
    teacher: c.teacher || "",
    spots: Number(c.spots) || 10,
    enrolled: Array.isArray(c.enrolled) ? c.enrolled.filter(function(e){return typeof e==="string";}) :
              (c.enrolled && typeof c.enrolled==="object") ? Object.values(c.enrolled).filter(function(e){return typeof e==="string";}) : []
  };
}

// \u2500\u2500 Payment helpers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function getPay(name){return payments.find(function(p){return p.name===name;});}
function daysLeft(name){var p=getPay(name);if(!p||!p.dueDate)return null;return Math.ceil((new Date(p.dueDate)-Date.now())/864e5);}
function payStatus(name){var d=daysLeft(name);if(d===null)return "none";if(d<0)return "overdue";if(d<=5)return "warning";return "ok";}
function nextMonth(s){var d=new Date(s);d.setMonth(d.getMonth()+1);return d.toISOString().split("T")[0];}
function sendDebt(idx){
  var s=students[idx];var p=getPay(s.name);
  var msg="\ud83c\udf38 *Pilates Mare*\n\nHola "+s.name+"! \ud83d\ude0a Te recordamos que ten\u00e9s el pago del mes pendiente."+(p&&p.dueDate?"\n\nVenci\u00f3 el: "+p.dueDate:"")+"\n\nCualquier consulta escribinos. \u00a1Gracias! \ud83d\ude4f";
  if(s.phone) openWA(s.phone,msg);
  else window.open("https://wa.me/?text="+encodeURIComponent(msg),"_blank");
}
function openPay(idx){
  var s=students[idx];var ep=getPay(s.name);
  var today=new Date().toISOString().split("T")[0];
  var autoM=s.freq==="3"?cuotas.v3:s.freq==="2"?cuotas.v2:"";
  showModal('<div style="font-size:16px;font-weight:bold;color:#5a3a4a;margin-bottom:4px">\ud83d\udcb0 Registrar pago</div><div style="font-size:13px;color:#9a7080;margin-bottom:14px">'+s.name+'</div><label>Monto ($)</label><input type="number" id="pm" value="'+(ep&&ep.monto?ep.monto:autoM)+'" placeholder="Ej: 42000"><label>Fecha de pago</label><input type="date" id="pp" value="'+(ep?ep.paidDate:today)+'" onchange="document.getElementById(\'pd\').value=nextMonth(this.value)"><label>Vencimiento</label><input type="date" id="pd" value="'+(ep?ep.dueDate:nextMonth(today))+'"><label>Forma de pago</label><select id="pf" style="margin-bottom:8px"><option value="transferencia">Transferencia</option><option value="efectivo">Efectivo</option></select><div style="font-size:11px;color:#9a8080;margin-bottom:10px">'+(s.phone?"\ud83d\udcf2 Se enviar\u00e1 recibo a "+s.phone:"\u26a0\ufe0f Sin celular \u2014 no se enviar\u00e1 recibo")+'</div><button onclick="confirmPay('+idx+')" class="pbtn" style="background:linear-gradient(135deg,#7aab8a,#5a9a7a)">\u2713 Confirmar'+(s.phone?" y enviar recibo \ud83d\udcf2":"")+'</button><button onclick="closeModal()" style="width:100%;padding:10px;background:none;border:none;color:#9a7080;cursor:pointer;font-family:Georgia,serif;margin-top:4px">Cancelar</button>');
}
function confirmPay(idx){
  var s=students[idx];
  var monto=document.getElementById("pm").value;
  var paid=document.getElementById("pp").value;
  var due=document.getElementById("pd").value;
  if(!paid||!due) return;
  payments=payments.filter(function(p){return p.name!==s.name;});
  var forma=(document.getElementById("pf")||{}).value||"transferencia";payments.push({name:s.name,paidDate:paid,dueDate:due,monto:monto,forma:forma});
  saveP();
  if(s.phone){
    var myCls=classes.filter(function(c){return c.enrolled.indexOf(s.name)>=0;});
    var days=[...new Set(myCls.map(function(c){return c.day;}))];
    var freq=days.indexOf("Lunes")>=0?"Lunes, Mi\u00e9rcoles y Viernes":days.indexOf("Martes")>=0?"Martes y Jueves":"";
    var time=myCls.length>0?myCls[0].time:"";
    var msg="\ud83c\udf38 *Pilates Mare*\n\n\u2705 *RECIBO DE PAGO*\n\n\ud83d\udc64 "+s.name+"\n\ud83d\udcc5 "+freq+(time?" a las "+time+"hs":"")+"\n\ud83d\udcb0 $"+Number(monto).toLocaleString("es-AR")+"\n\ud83d\udcc6 Fecha: "+paid+"\n\u23f3 V\u00e1lido hasta: "+due+"\n\n\u00a1Gracias! \ud83e\uddd8\u200d\u2640\ufe0f";
    openWA(s.phone,msg);
  }
  closeModal();notif("\u2713 Pago registrado"+(s.phone?" \u00b7 Recibo enviado":""));render();
}

  var days=freq==="3"?["Lunes","Mi\u00e9rcoles","Viernes"]:["Martes","Jueves"];

    if(days.indexOf(c.day)>=0&&c.time===time&&c.enrolled.indexOf(name)<0)
      return Object.assign({},c,{enrolled:c.enrolled.concat([name])});

function saveSt(idx){
  var name=document.getElementById("en").value.trim();
  if(!name) return notif("Escrib\u00ed el nombre","error");
  var isNew=idx===-1;
  var oldName=isNew?null:students[idx].name;
  var oldActive=isNew?true:(students[idx].active!==false);
  if(isNew&&students.find(function(s){return s.name===name;})) return notif("Esa alumna ya existe","error");
  var freq=document.getElementById("ef").value;
  var time=document.getElementById("et").value;
  var paid=document.getElementById("epp").value;
  var due=document.getElementById("epd").value;
  if(!isNew) unenroll(oldName);
  if(freq&&time&&oldActive) enroll(name,freq,time);
  var st={
    name:name,phone:document.getElementById("ep").value.trim(),freq:freq,time:time,active:oldActive,
    birthdate:document.getElementById("eb").value,dni:document.getElementById("ed").value.trim(),
    profession:document.getElementById("ef2").value.trim(),emergency:document.getElementById("ee").value.trim(),
    notes:document.getElementById("eo").value.trim()
  };
  if(isNew) students=[...students,st].sort(function(a,b){return a.name.localeCompare(b.name);});
  else{
    students=students.map(function(s,i){return i===idx?st:s;});
    absences=absences.map(function(a){return a.studentName===oldName?Object.assign({},a,{studentName:name}):a;});
    payments=payments.map(function(p){return p.name===oldName?Object.assign({},p,{name:name}):p;});
    saveA();saveP();
  }
  if(paid&&due){payments=payments.filter(function(p){return p.name!==name;});payments.push({name:name,paidDate:paid,dueDate:due,monto:""});saveP();}
  saveS();saveC();closeModal();notif("\u2713 "+(isNew?"Alumna agregada":"Cambios guardados"));render();
}
function toggleBaja(idx){
  students[idx].active=students[idx].active===false?true:false;
  if(!students[idx].active) unenroll(students[idx].name);
  saveS();saveC();closeModal();notif(students[idx].active?"\u2713 Alumna reactivada":"Alumna dada de baja");render();
}
function delSt(idx){
  if(!confirm("\u00bfEliminar a "+students[idx].name+"?")) return;
  var name=students[idx].name;
  unenroll(name);
  students=students.filter(function(_,i){return i!==idx;});
  absences=absences.filter(function(a){return a.studentName!==name;});
  payments=payments.filter(function(p){return p.name!==name;});
  saveS();saveC();saveA();saveP();closeModal();notif("Alumna eliminada");render();
}
function toggleEnroll(cid,name){
  classes=classes.map(function(c){
    if(c.id!=cid) return c;
    var enrolled=c.enrolled.indexOf(name)>=0?c.enrolled.filter(function(e){return e!==name;}):c.enrolled.concat([name]);
    return Object.assign({},c,{enrolled:enrolled});
  });
  saveC();render();
}
function rmClass(id){classes=classes.filter(function(c){return c.id!=id;});saveC();render();}
function rmAbsence(i){absences=absences.filter(function(_,j){return j!==i;});saveA();render();}
function addCls(){
  var day=document.getElementById("ncd").value,time=document.getElementById("nct").value,teacher=document.getElementById("nch").value,spots=parseInt(document.getElementById("ncs").value)||10;
  classes.push({id:Date.now(),day:day,time:time,teacher:teacher,spots:spots,enrolled:[]});
  saveC();render();
}

// \u2500\u2500 Absence/Join \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function absFor(id){return absences.filter(function(a){return a.classId==id;}).map(function(a){return a.studentName;});}
function free(c){return absFor(c.id).length+(c.spots-c.enrolled.length);}
function confirmAbsence(){
  if(!selClass||!selStudent) return notif("Complet\u00e1 todos los campos","error");
  var cls=classes.find(function(c){return c.id==selClass;});
  if(cls.enrolled.indexOf(selStudent)<0) return notif("No est\u00e1s inscripta en esa clase","error");
  if(absences.find(function(a){return a.classId==selClass&&a.studentName===selStudent;})) return notif("Ya avisaste tu falta","error");
  absences.push({classId:selClass,studentName:selStudent});
  saveA();
  notif("\u00a1Listo! Tu lugar qued\u00f3 disponible \ud83c\udf38");
  var msg="\ud83c\udf38 *Pilates Mare*\n\nHola "+cls.teacher+"! Te aviso que *"+selStudent+"* no va a poder ir a tu clase del *"+cls.day+" a las "+cls.time+"hs*.\n\nSu lugar qued\u00f3 disponible. \ud83e\uddd8\u200d\u2640\ufe0f";
  openWA(TEACHERS[cls.teacher],msg);
  showView("home");
}
function confirmJoin(){
  var name=joinSt||joinName.trim();
  if(!selClass||!name) return notif("Complet\u00e1 todos los campos","error");
  var cls=classes.find(function(c){return c.id==selClass;});
  if(free(cls)<=0) return notif("No hay lugares disponibles","error");
  if(cls.enrolled.indexOf(name)>=0) return notif("Ya est\u00e1s inscripta","error");
  classes=classes.map(function(c){return c.id==selClass?Object.assign({},c,{enrolled:c.enrolled.concat([name])}):c;});
  var rm=absences.find(function(a){return a.classId==selClass;});
  if(rm) absences=absences.filter(function(a){return !(a.classId==selClass&&a.studentName===rm.studentName);});
  saveC();saveA();
  notif("\u00a1Genial! Te sumaste \ud83c\udf89");
  var msg="\ud83c\udf38 *Pilates Mare*\n\nHola "+cls.teacher+"! *"+name+"* se anot\u00f3 en tu clase del *"+cls.day+" a las "+cls.time+"hs*. \ud83e\uddd8\u200d\u2640\ufe0f";
  openWA(TEACHERS[cls.teacher],msg);
  showView("home");
}

}

function sendLiq(name){
  var phone=TEACHERS[name];if(!phone) return;
  var now=new Date();var tm=now.getFullYear()+"-"+(String(now.getMonth()+1).padStart(2,"0"));
  var ptm=payments.filter(function(p){return p.paidDate&&p.paidDate.startsWith(tm);});
  var lines=[];var tTotal=0;
  students.filter(function(s){return s.active!==false;}).forEach(function(s){
    var myCls=classes.filter(function(c){return c.enrolled.indexOf(s.name)>=0;});
    if(!myCls.length||myCls[0].teacher!==name) return;
    var pay=ptm.find(function(p){return p.name===s.name;});
    if(pay){tTotal+=Number(pay.monto||0);lines.push("\u2022 "+s.name+": $"+Number(pay.monto||0).toLocaleString("es-AR"));}
  });
  var corr=Math.round(tTotal*0.5);
  var mn=now.toLocaleString("es-AR",{month:"long",year:"numeric"});
  var msg="\ud83c\udf38 *Pilates Mare*\n\n\ud83d\udcca *LIQUIDACI\u00d3N "+mn.toUpperCase()+"*\n\nHola "+name+"!\n\n"+lines.join("\n")+"\n\n\ud83d\udcb0 Total: $"+tTotal.toLocaleString("es-AR")+"\n\u2705 Tu 50%: $"+corr.toLocaleString("es-AR")+"\n\n\u00a1Gracias! \ud83e\uddd8\u200d\u2640\ufe0f";
  openWA(phone,msg);
}

  h+='</div></div>';
  ALL_DAYS.forEach(function(day){
    var dc=classes.filter(function(c){return c.day===day;});if(!dc.length) return;
    h+='<div style="font-size:10px;letter-spacing:2px;color:white;background:'+DAY_COLORS[day]+';padding:5px 12px;border-radius:8px 8px 0 0;display:inline-block">'+day.toUpperCase()+'</div>';
    dc.forEach(function(c){
      var abs=absFor(c.id);
      h+='<div style="background:rgba(255,255,255,0.8);border:1px solid rgba(200,180,180,0.2);border-radius:0 10px 10px 10px;margin-bottom:7px">';
      h+='<div style="display:flex;align-items:center;padding:10px 14px;gap:8px">';
      h+='<span style="font-weight:bold;color:#5a3a4a;flex:1">'+c.time+'hs <span style="font-size:11px;color:#b09080;font-weight:normal">\u00b7 '+c.teacher+'</span></span>';
      h+='<span style="font-size:11px;color:#9a7080">'+c.enrolled.length+'/'+c.spots+'</span>';
      h+='<button onclick="this.parentElement.nextElementSibling.style.display=this.parentElement.nextElementSibling.style.display===\'none\'?\'block\':\'none\'" style="background:none;border:none;cursor:pointer;font-size:13px">\u25bc</button>';
      h+='<button onclick="rmClass('+c.id+')" style="background:none;border:none;cursor:pointer;font-size:13px">\ud83d\uddd1\ufe0f</button>';
      h+='</div>';
      h+='<div style="display:none;padding:0 14px 12px"><div style="font-size:10px;color:#9a7080;letter-spacing:1px;margin-bottom:7px">INSCRIPTAS</div><div>';
      students.forEach(function(s){
        var on=c.enrolled.indexOf(s.name)>=0;var struck=abs.indexOf(s.name)>=0;
        h+='<button class="itag'+(on?' on':'')+'" onclick="toggleEnroll('+c.id+',\''+s.name.replace(/'/g,"\\\'")+'\''+')" style="'+(struck?'text-decoration:line-through;opacity:0.5;':'')+'">'+s.name+'</button>';
      });
      h+='</div></div></div>';
    });
  });
  return h;
}

function rAusencias(){
  var h='<div style="font-size:11px;color:#9a7080;letter-spacing:1.5px;margin-bottom:12px;font-weight:bold">\ud83d\ude4b AUSENCIAS</div>';
  if(!absences.length) h+='<div style="color:#bbb;font-size:13px;text-align:center;padding:28px">No hay ausencias avisadas \ud83c\udf38</div>';
  absences.forEach(function(a,i){
    var cls=classes.find(function(c){return c.id==a.classId;});
    h+='<div class="row" style="margin-bottom:6px"><div style="flex:1"><span style="font-weight:bold;color:#5a3a4a">'+a.studentName+'</span><span style="color:#aaa;margin-left:8px;font-size:12px">falta a '+(cls?cls.day+' '+cls.time+'hs':'clase eliminada')+'</span></div><button onclick="rmAbsence('+i+')" style="background:none;border:none;color:#e57373;cursor:pointer;font-size:16px">\u2715</button></div>';
  });
  return h;
}

function rProfes(){
  var colors={"Anabella":"#d4a5a5","Maia":"#a5b4d4","Roc\u00edo":"#a5d4b4","Antonela":"#d4cca5","Iara":"#c4a5d4"};
  var h='<div style="font-size:11px;color:#9a7080;letter-spacing:1.5px;margin-bottom:12px;font-weight:bold">\ud83d\udc69\u200d\ud83c\udfeb PROFES</div>';
  Object.entries(TEACHERS).forEach(function(e){var name=e[0],phone=e[1];
    h+='<div class="row" style="margin-bottom:8px;border-left:4px solid '+(colors[name]||'#ccc')+'"><div style="flex:1"><div style="font-weight:bold;color:#5a3a4a">'+name+'</div><div style="font-size:11px;color:#9a8080;margin-top:2px">+'+phone+'</div><div style="font-size:11px;background:rgba(212,128,154,0.1);padding:4px 8px;border-radius:6px;margin-top:4px">&#128274; App: <b>'+(T_PASS[name]||'')+'</b></div></div>';
    h+='<button onclick="openWA(\''+phone+'\',\'Hola '+name+'! \ud83c\udf38\')" class="smb" style="background:'+(colors[name]||'#ccc')+';color:#5a3a4a">\ud83d\udcac WA</button></div>';
  });
  return h;
}
</script>
