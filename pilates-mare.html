<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Pilates Mare</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:linear-gradient(135deg,#fdf6f0,#f5e6e8,#e8f0f5);min-height:100vh;color:#3a2a3a}
#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:10px}
.hdr{background:rgba(255,255,255,0.85);border-bottom:1px solid rgba(200,180,180,0.3);padding:12px 20px;position:sticky;top:0;z-index:100;display:none;align-items:center;justify-content:space-between}
.wrap{max-width:600px;margin:0 auto;padding:16px;display:none}
.card{background:rgba(255,255,255,0.82);border:1px solid rgba(200,180,180,0.2);border-radius:16px;padding:16px;margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.bigbtn{border:none;border-radius:18px;padding:22px 16px;cursor:pointer;text-align:left;color:white;width:100%;font-family:Georgia,serif;margin-bottom:0}
input,select,textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(200,180,180,0.3);background:rgba(255,255,255,0.9);font-size:14px;font-family:Georgia,serif;color:#5a3a4a;outline:none;margin-bottom:8px}
label{display:block;font-size:11px;color:#9a7080;letter-spacing:1px;margin-bottom:4px;margin-top:8px}
.pbtn{width:100%;padding:14px;color:white;border:none;border-radius:14px;font-size:15px;font-family:Georgia,serif;cursor:pointer;margin-top:8px}
.bbtn{background:none;border:none;color:#9a7080;cursor:pointer;font-size:13px;margin-bottom:16px;padding:0;font-family:Georgia,serif}
.badge{padding:3px 10px;border-radius:16px;font-size:11px;font-weight:bold}
.bg{background:#7aab8a;color:white}
.bo{background:rgba(122,171,138,0.15);color:#5a8a6a;border:1px solid rgba(122,171,138,0.3)}
.br{background:rgba(200,100,100,0.1);color:#c06060;border:1px solid rgba(200,100,100,0.2)}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:7px 14px;border-radius:16px;border:1px solid rgba(200,180,180,0.3);font-size:12px;cursor:pointer;font-family:Georgia,serif;background:rgba(255,255,255,0.7);color:#7a5a6a}
.tab.on{color:white;border-color:transparent}
.notif{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:24px;color:white;font-size:13px;font-family:Georgia,serif;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.15);display:none}
.row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.82);border-radius:12px;padding:10px 12px;border:1px solid rgba(200,180,180,0.2);margin-bottom:6px}
.clsbtn{width:100%;padding:12px 14px;margin-bottom:7px;border-radius:12px;border:1px solid rgba(200,180,180,0.3);background:rgba(255,255,255,0.8);color:#5a3a4a;cursor:pointer;text-align:left;font-family:Georgia,serif;display:flex;justify-content:space-between;align-items:center}
.clsbtn.sel{border:2px solid #d4809a;background:rgba(212,128,154,0.1)}
.jbtn{width:100%;padding:14px;margin-bottom:8px;border-radius:12px;border:1px solid rgba(180,200,220,0.4);background:rgba(255,255,255,0.8);cursor:pointer;text-align:left;font-family:Georgia,serif;display:flex;justify-content:space-between;align-items:center}
.jbtn.sel{border:2px solid #8ab8d8;background:rgba(138,184,216,0.1)}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mbox{background:#fff;border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.smb{padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;font-family:Georgia,serif;border:none;color:white}
</style>
</head>

  if(!students.length)students=NAMES.map(function(n){return{name:n,phone:"",freq:"",time:"",active:true,birthdate:"",dni:"",emergency:"",notes:""};});
  step("Cargando ausencias...");return dbGet("absences");
}).then(function(raw){
  absences=raw?toArr(raw).filter(function(a){return a&&a.classId;}):[];
  return dbGet("payments");
}).then(function(raw){
  payments=raw?toArr(raw).filter(function(p){return p&&p.name;}):[];
  return dbGet("cuotas");
}).then(function(raw){
  if(raw&&raw.v2)cuotas=raw;
  showApp();
}).catch(function(e){errApp("Error de conexi\u00f3n: "+e.message);});

function notif(msg,err){var n=document.getElementById("notif");n.textContent=msg;n.style.background=err?"#e57373":"#7aab8a";n.style.display="block";setTimeout(function(){n.style.display="none";},3000);}
function openWA(phone,msg){window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg),"_blank");}
function showView(v){view=v;selClass=null;selStudent="";joinSt="";if(v==="home"&&!adminOk)alumnaName="";var b=document.getElementById("admbtn");if(b){b.style.background=v==="admin"?"#d4809a":"none";b.style.color=v==="admin"?"white":"#7a4a5a";b.style.border=v==="admin"?"none":"1px solid #c4a0b0";}render();}
function goHome(){alumnaName="";adminOk=false;showView("home");}
function closeModal(){document.getElementById("modal").style.display="none";}
function showModal(h){document.getElementById("mbox").innerHTML=h;document.getElementById("modal").style.display="flex";}
function getPay(n){return payments.find(function(p){return p.name===n;});}
function daysLeft(n){var p=getPay(n);if(!p||!p.dueDate)return null;return Math.ceil((new Date(p.dueDate)-Date.now())/864e5);}
function payStatus(n){var d=daysLeft(n);if(d===null)return"none";if(d<0)return"overdue";if(d<=5)return"warning";return"ok";}
function nextMonth(s){var d=new Date(s);d.setMonth(d.getMonth()+1);return d.toISOString().split("T")[0];}
function absFor(id){return absences.filter(function(a){return a.classId==id;}).map(function(a){return a.studentName;});}
function free(c){return absFor(c.id).length+(c.spots-c.enrolled.length);}
function enroll(name,freq,time){var days=freq==="3"?["Lunes","Mi\u00e9rcoles","Viernes"]:["Martes","Jueves"];classes=classes.map(function(c){if(days.indexOf(c.day)>=0&&c.time===time&&c.enrolled.indexOf(name)<0)return Object.assign({},c,{enrolled:c.enrolled.concat([name])});return c;});}
function unenroll(name){classes=classes.map(function(c){return Object.assign({},c,{enrolled:c.enrolled.filter(function(e){return e!==name;})});});}

// ===== CAMBIAR CLASE =====
function rJoin(){
  var now=new Date();
  var DN=["Domingo","Lunes","Martes","Mi\u00e9rcoles","Jueves","Viernes","S\u00e1bado"];
  var todayNum=now.getDay();var todayName=DN[todayNum];var tomorrowName=DN[(todayNum+1)%7];
  var nowH=now.getHours();var nowM=now.getMinutes();
  var myName=alumnaName||joinSt;
  var jm=window._jm||"";
  var nowYM=now.getFullYear()+"-"+(String(now.getMonth()+1).padStart(2,"0"));
  var myChanges=absences.filter(function(a){return a.studentName===myName&&a.recovery&&a.date&&a.date.startsWith(nowYM);}).length;
  var remaining=3-myChanges;
  var h='<button class="bbtn" onclick="window._jm=\'\';if(alumnaName)render();else showView(\'home\')">&larr; Volver</button>';
  h+='<div style="font-size:22px;font-weight:bold;color:#4a5a7a;margin-bottom:10px">&#128260; Cambiar mi clase</div>';
  var bc=remaining>0?"#7aab8a":"#e57373";
  h+='<div style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.7);border-radius:12px;padding:10px 14px;margin-bottom:16px"><div style="font-size:28px;font-weight:bold;color:'+bc+'">'+remaining+'</div><div><div style="font-size:13px;font-weight:bold;color:#5a3a4a">cambio'+(remaining!==1?'s':'')+' disponible'+(remaining!==1?'s':'')+' este mes</div><div style="font-size:11px;color:#9a7080">M\u00e1ximo 3 por mes</div></div></div>';
  if(remaining<=0)return h+'<div class="card" style="text-align:center;color:#c06060;padding:20px">&#10071; Ya usaste tus 3 cambios este mes.</div>';
  if(!jm){
    h+='<div class="grid2">';
    h+='<button onclick="window._jm=\'recover\';selClass=null;render()" style="padding:20px;border-radius:14px;border:1px solid rgba(180,200,220,0.4);background:rgba(255,255,255,0.8);cursor:pointer;font-family:Georgia,serif;text-align:center"><div style="font-size:26px;margin-bottom:6px">&#128260;</div><b style="color:#3a4a6a">Cambiar d\u00eda</b><div style="font-size:11px;color:#9a7080;margin-top:4px">Ir un d\u00eda diferente al m\u00edo</div></button>';
    h+='<button onclick="window._jm=\'advance\';selClass=null;render()" style="padding:20px;border-radius:14px;border:1px solid rgba(200,165,212,0.4);background:rgba(255,255,255,0.8);cursor:pointer;font-family:Georgia,serif;text-align:center"><div style="font-size:26px;margin-bottom:6px">&#9201;&#65039;</div><b style="color:#5a3a5a">Cambiar horario</b><div style="font-size:11px;color:#9a7080;margin-top:4px">Adelantar o atrasar en mi d\u00eda</div></button>';
    h+='</div>';return h;
  }
  var isAdv=jm==="advance";
  var myC=classes.filter(function(c){return c.enrolled.indexOf(myName)>=0;});
  var myDays=[];myC.forEach(function(c){if(myDays.indexOf(c.day)<0)myDays.push(c.day);});
  var myIds=myC.map(function(c){return c.id;});
  var avail=classes.filter(function(c){
    if(free(c)<=0||myIds.indexOf(c.id)>=0)return false;
    var pts=c.time.split(":");var cH=parseInt(pts[0]);var cM=parseInt(pts[1]);
    var isFut=cH>nowH||(cH===nowH&&cM>nowM);
    var dIdx=DN.indexOf(c.day);var diff=(dIdx-todayNum+7)%7;
    if(isAdv){return myDays.indexOf(c.day)>=0&&diff<=1&&(diff===0?isFut:true);}
    else{return myDays.indexOf(c.day)<0&&diff>=0&&diff<=3&&(diff===0?isFut:true);}
  });
  h+='<div style="background:'+(isAdv?"rgba(200,165,212,0.15)":"rgba(138,184,216,0.15)")+';border-radius:12px;padding:10px 14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">';
  h+='<div><b style="color:#5a3a4a">'+(isAdv?"&#9201;&#65039; Cambiar horario":"&#128260; Cambiar d\u00eda")+'</b>'+(isAdv?'<div style="font-size:11px;color:#9a7080">Tu clase de ma\u00f1ana quedar\u00e1 libre autom\u00e1ticamente</div>':'')+'</div>';
  h+='<button onclick="window._jm=\'\';selClass=null;render()" style="background:none;border:none;color:#9a7080;cursor:pointer;font-family:Georgia,serif">&larr;</button></div>';
  if(!avail.length)return h+'<div class="card" style="text-align:center;color:#aaa;padding:20px">No hay lugares disponibles ahora &#127800;</div>';
  var shownDays=[];avail.forEach(function(c){if(shownDays.indexOf(c.day)<0)shownDays.push(c.day);});
  shownDays.forEach(function(day){
    var dc=avail.filter(function(c){return c.day===day;});
    var lbl=day===todayName?"HOY":day===tomorrowName?"MA\u00d1ANA":day.toUpperCase();

function sendLiq(name){

  Object.keys(T_PHONES).forEach(function(name){
    var phone=T_PHONES[name];var pass=T_PASS[name];
    var myC=classes.filter(function(c){return c.teacher===name;});
    var days=[];myC.forEach(function(c){if(days.indexOf(c.day)<0)days.push(c.day);});
    var times={};myC.forEach(function(c){if(!times[c.day])times[c.day]=[];times[c.day].push(c.time);});
    var alumnas=students.filter(function(s){return s.active!==false&&myC.some(function(c){return c.enrolled.indexOf(s.name)>=0;});});
    h+='<div class="card" style="margin-bottom:10px;border-left:4px solid '+(tColors[name]||"#ccc")+'">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    h+='<div style="font-size:16px;font-weight:bold;color:#5a3a4a">'+name+'</div>';
    h+='<button onclick="openWA(\''+phone+'\',\'Hola '+name+'! &#127800;\')" class="smb" style="background:#25D366">WA</button></div>';
    h+='<div style="font-size:12px;color:#9a7080">&#128241; +'+phone+'</div>';
    h+='<div style="font-size:12px;color:#7a5a4a;background:rgba(212,128,154,0.08);padding:6px 10px;border-radius:8px;margin-top:6px">&#128274; Clave app: <b>'+pass+'</b></div>';
    h+='<div style="font-size:12px;color:#9a7080;margin-top:6px">&#128105;&#8205;&#127891; '+alumnas.length+' alumnas</div>';
    if(days.length){h+='<div style="margin-top:8px;font-size:11px;color:#7a5a6a">';days.forEach(function(d){h+='<div>&#128197; '+d+': '+(times[d]||[]).join(', ')+'hs</div>';});h+='</div>';}
    h+='</div>';
  });
  return h;
}

</script>
