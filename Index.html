<title>Pilates Mare</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:linear-gradient(135deg,#fdf6f0,#f5e6e8,#e8f0f5);min-height:100vh;color:#3a2a3a}
#loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:10px}
.hdr{background:rgba(255,255,255,0.85);border-bottom:1px solid rgba(200,180,180,0.3);padding:12px 20px;position:sticky;top:0;z-index:100;display:none;align-items:center;justify-content:space-between}
.wrap{max-width:600px;margin:0 auto;padding:16px;display:none}
.card{background:rgba(255,255,255,0.82);border:1px solid rgba(200,180,180,0.2);border-radius:16px;padding:16px;margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.bigbtn{border:none;border-radius:18px;padding:24px 16px;cursor:pointer;text-align:left;color:white;width:100%;font-family:Georgia,serif}
input,select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(200,180,180,0.3);background:rgba(255,255,255,0.9);font-size:14px;font-family:Georgia,serif;color:#5a3a4a;outline:none;margin-bottom:8px}
label{display:block;font-size:11px;color:#9a7080;letter-spacing:1px;margin-bottom:5px;margin-top:6px}
.pbtn{width:100%;padding:14px;color:white;border:none;border-radius:14px;font-size:15px;font-family:Georgia,serif;cursor:pointer;margin-top:6px}
.bbtn{background:none;border:none;color:#9a7080;cursor:pointer;font-size:13px;margin-bottom:16px;padding:0;font-family:Georgia,serif}
.badge{padding:3px 10px;border-radius:16px;font-size:11px}
.bg{background:#7aab8a;color:white}.bo{background:rgba(122,171,138,0.15);color:#5a8a6a;border:1px solid rgba(122,171,138,0.3)}.br{background:rgba(200,100,100,0.1);color:#c06060;border:1px solid rgba(200,100,100,0.2)}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:6px 12px;border-radius:16px;border:1px solid rgba(200,180,180,0.3);font-size:12px;cursor:pointer;font-family:Georgia,serif;background:rgba(255,255,255,0.7);color:#7a5a6a}
.tab.on{color:white}
.notif{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:24px;color:white;font-size:13px;font-family:Georgia,serif;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.15);display:none}
.row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.82);border-radius:12px;padding:10px 12px;border:1px solid rgba(200,180,180,0.2);margin-bottom:6px}
.clsbtn{width:100%;padding:12px 14px;margin-bottom:7px;border-radius:12px;border:1px solid rgba(200,180,180,0.3);background:rgba(255,255,255,0.8);color:#5a3a4a;cursor:pointer;text-align:left;font-family:Georgia,serif;display:flex;justify-content:space-between;align-items:center}
.clsbtn.sel{border:2px solid #d4809a;background:rgba(212,128,154,0.1)}
.jbtn{width:100%;padding:14px;margin-bottom:8px;border-radius:12px;border:1px solid rgba(180,200,220,0.4);background:rgba(255,255,255,0.8);cursor:pointer;text-align:left;font-family:Georgia,serif;display:flex;justify-content:space-between;align-items:center}
.jbtn.sel{border:2px solid #8ab8d8;background:rgba(138,184,216,0.1)}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mbox{background:#fff;border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto}
.smb{padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;font-family:Georgia,serif;border:none;color:white}
.itag{padding:3px 10px;border-radius:16px;font-size:11px;cursor:pointer;font-family:Georgia,serif;margin:2px;border:1px solid rgba(200,180,180,0.3);background:rgba(240,240,240,0.5);color:#9a8090;display:inline-block}
.itag.on{background:rgba(212,128,154,0.15);color:#b0506a;border-color:#d4809a}
</style>

function getPay(n){return payments.find(function(p){return p.name===n;});}
function daysLeft(n){var p=getPay(n);if(!p||!p.dueDate)return null;return Math.ceil((new Date(p.dueDate)-Date.now())/864e5);}
function payStatus(n){var d=daysLeft(n);if(d===null)return”none”;if(d<0)return”overdue”;if(d<=5)return”warning”;return”ok”;}
function nextMonth(s){var d=new Date(s);d.setMonth(d.getMonth()+1);return d.toISOString().split(“T”)[0];}

var s=students[i];

if(s.phone)openWA(s.phone,m);else window.open(“https://wa.me/?text=”+encodeURIComponent(m),”*blank”);
}

openWA(s.phone,msg);
}
closeModal();notif(“✓ Pago registrado”+(s.phone?” · Recibo enviado”:””));render();
}
function enroll(name,freq,time){
var days=freq===“3”?[“Lunes”,“Miércoles”,“Viernes”]:[“Martes”,“Jueves”];
classes=classes.map(function(c){if(days.indexOf(c.day)>=0&&c.time===time&&c.enrolled.indexOf(name)<0)return Object.assign({},c,{enrolled:c.enrolled.concat([name])});return c;});
}
function unenroll(name){classes=classes.map(function(c){return Object.assign({},c,{enrolled:c.enrolled.filter(function(e){return e!==name;})});});}

function saveSt(idx){
var name=document.getElementById(“en”).value.trim();if(!name)return notif(“Escribí el nombre”,“error”);
var isNew=idx===-1;var oldName=isNew?null:students[idx].name;var oldActive=isNew?true:(students[idx].active!==false);
if(isNew&&students.find(function(s){return s.name===name;}))return notif(“Ya existe”,“error”);
var freq=document.getElementById(“ef”).value;var time=document.getElementById(“et”).value;
var paid=document.getElementById(“epp”).value;var due=document.getElementById(“epd”).value;
if(!isNew)unenroll(oldName);
if(freq&&time&&oldActive)enroll(name,freq,time);
var st={name:name,phone:document.getElementById(“ep”).value.trim(),freq:freq,time:time,active:oldActive,birthdate:document.getElementById(“eb”).value,dni:document.getElementById(“ed”).value.trim(),emergency:document.getElementById(“ee”).value.trim(),notes:document.getElementById(“eo”).value.trim()};
if(isNew)students=students.concat([st]).sort(function(a,b){return a.name.localeCompare(b.name);});
else{students=students.map(function(s,i){return i===idx?st:s;});absences=absences.map(function(a){return a.studentName===oldName?Object.assign({},a,{studentName:name}):a;});payments=payments.map(function(p){return p.name===oldName?Object.assign({},p,{name:name}):p;});saveA();saveP();}
if(paid&&due){payments=payments.filter(function(p){return p.name!==name;});payments.push({name:name,paidDate:paid,dueDate:due,monto:””});saveP();}
saveS();saveC();closeModal();notif(“✓ “+(isNew?“Alumna agregada”:“Guardado”));render();

var total=ptm.reduce(function(s,p){return s+Number(p.monto||0);},0);
h+=’<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">’;
h+=’<div class="card" style="text-align:center;border-top:3px solid #d4809a"><div style="font-size:11px;color:#9a7080;margin-bottom:4px">RECAUDADO</div><div style="font-size:20px;font-weight:bold;color:#7a4a5a">$’+total.toLocaleString(“es-AR”)+’</div><div style="font-size:11px;color:#9a7080">’+ptm.length+’ pagos</div></div>’;
h+=’<div class="card" style="text-align:center;border-top:3px solid #ffb74d"><div style="font-size:11px;color:#9a7080;margin-bottom:4px">PENDIENTES</div><div style="font-size:20px;font-weight:bold;color:#e59040">’+students.filter(function(s){var st=payStatus(s.name);return s.active!==false&&st!==“ok”&&st!==“warning”;}).length+’</div></div></div>’;
var colors={Anabella:”#d4a5a5”,Maia:”#a5b4d4”,“Rocío”:”#a5d4b4”,Antonela:”#d4cca5”,Iara:”#c4a5d4”};
h+=’<div style="font-size:11px;color:#9a7080;letter-spacing:1.5px;margin-bottom:10px;font-weight:bold">💸 LIQUIDACIÓN (50%)</div>’;
Object.keys(TEACHERS).forEach(function(name){
var tT=0,tC=0;students.filter(function(s){return s.active!==false;}).forEach(function(s){var myCls=classes.filter(function(c){return c.enrolled.indexOf(s.name)>=0;});if(!myCls.length||myCls[0].teacher!==name)return;var pay=ptm.find(function(p){return p.name===s.name;});if(pay){tT+=Number(pay.monto||0);tC++;}});
var corr=Math.round(tT*0.5);
h+=’<div class=“card” style=“margin-bottom:8px;border-left:4px solid ‘+(colors[name]||”#ccc”)+’;padding:12px”><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:bold;color:#5a3a4a">’+name+’</div><div style="font-size:12px;color:#9a7080;margin-top:2px">’+tC+’ alumnas · $’+tT.toLocaleString(“es-AR”)+’</div></div><div style="text-align:right"><div style="font-size:18px;font-weight:bold;color:#5a8a6a">$’+corr.toLocaleString(“es-AR”)+’</div><div style="font-size:10px;color:#9a7080">50%</div></div></div><button onclick="sendLiq(\''+name+'\')" style="margin-top:8px;width:100%;padding:7px;background:#25D366;border:none;color:white;border-radius:8px;font-size:12px;cursor:pointer;font-family:Georgia,serif">📲 Enviar liquidación</button></div>’;
});
return h;
}
function sendLiq(name){
var phone=TEACHERS[name];if(!phone)return;
var now=new Date();var tm=now.getFullYear()+”-”+(String(now.getMonth()+1).padStart(2,“0”));
var ptm=payments.filter(function(p){return p.paidDate&&p.paidDate.startsWith(tm);});
var lines=[],tT=0;students.filter(function(s){return s.active!==false;}).forEach(function(s){var myCls=classes.filter(function(c){return c.enrolled.indexOf(s.name)>=0;});if(!myCls.length||myCls[0].teacher!==name)return;var pay=ptm.find(function(p){return p.name===s.name;});if(pay){tT+=Number(pay.monto||0);lines.push(”• “+s.name+”: $”+Number(pay.monto||0).toLocaleString(“es-AR”));}});
var corr=Math.round(tT*0.5);var mn=now.toLocaleString(“es-AR”,{month:“long”,year:“numeric”});
var msg=”🌸 *Pilates Mare*\n\n📊 *LIQUIDACIÓN “+mn.toUpperCase()+”*\n\nHola “+name+”!\n\n”+lines.join(”\n”)+”\n\n💰 Total: $”+tT.toLocaleString(“es-AR”)+”\n✅ Tu 50%: $”+corr.toLocaleString(“es-AR”)+”\n\n¡Gracias! 🧘‍♀️”;
openWA(phone,msg);
}

function rClases(){
var selT=window._clsTeacher||“Todas”;
var h=’<div class="tabs" style="margin-bottom:14px">’;
h+=’<button class=“tab’+(selT===“Todas”?” on”:””)+’” style=”’+(selT===“Todas”?“background:#d4809a;”:””)+’” onclick=“window._clsTeacher='Todas';render()”>Todas</button>’;
Object.keys(TEACHERS).forEach(function(t){var cnt=classes.filter(function(c){return c.teacher===t;}).reduce(function(a,c){return a+c.enrolled.length;},0);h+=’<button class=“tab’+(selT===t?” on”:””)+’” style=”’+(selT===t?“background:#d4809a;”:””)+’” onclick=“window._clsTeacher='’+t+’';render()”>’+t+’ (’+cnt+’)</button>’;});
h+=’</div>’;
h+=’<div class="card" style="margin-bottom:14px"><div style="font-size:11px;color:#9a7080;letter-spacing:1px;margin-bottom:10px">NUEVA CLASE</div>’;
h+=’<div style="display:flex;gap:6px;flex-wrap:wrap"><select id="ncd" style="flex:1;min-width:90px">’+ALL_DAYS.map(function(d){return’<option>’+d+’</option>’;}).join(’’)+’</select>’;
h+=’<input type="time" id="nct" value="09:00" style="width:95px"><select id="nch" style="flex:1;min-width:90px">’+Object.keys(TEACHERS).map(function(t){return’<option>’+t+’</option>’;}).join(’’)+’</select>’;
h+=’<input type="number" id="ncs" value="10" min="1" max="20" style="width:55px"><button onclick="addCls()" class="smb" style="background:#d4809a;padding:8px 12px">+ Agregar</button></div></div>’;
ALL_DAYS.forEach(function(day){
var dc=classes.filter(function(c){return c.day===day&&(selT===“Todas”||c.teacher===selT);});if(!dc.length)return;
h+=’<div style="font-size:10px;letter-spacing:2px;color:white;background:'+DAY_COLORS[day]+';padding:5px 12px;border-radius:8px 8px 0 0;display:inline-block">’+day.toUpperCase()+’</div>’;
dc.forEach(function(c){
var abs=absFor(c.id);var cf=free(c);
h+=’<div style="background:rgba(255,255,255,0.8);border:1px solid rgba(200,180,180,0.2);border-radius:0 10px 10px 10px;margin-bottom:7px">’;
h+=’<div style="display:flex;align-items:center;padding:10px 14px;gap:8px"><span style="font-weight:bold;color:#5a3a4a;flex:1">’+c.time+‘hs <span style="font-size:11px;color:#b09080;font-weight:normal">· ‘+c.teacher+’</span></span>’;
h+=’<span style=“font-size:11px;color:’+(cf===0?”#e57373”:”#9a7080”)+’”>’+c.enrolled.length+’/’+c.spots+’ · ‘+(cf>0?cf+’ libre’+(cf>1?‘s’:’’):‘COMPLETA’)+’</span>’;
h+=’<button onclick="this.parentElement.nextElementSibling.style.display=this.parentElement.nextElementSibling.style.display===\'none\'?\'block\':\'none\'" style="background:none;border:none;cursor:pointer;font-size:13px">▼</button>’;
h+=’<button onclick="rmClass('+c.id+')" style="background:none;border:none;cursor:pointer;font-size:13px">🗑️</button></div>’;
h+=’<div style="display:none;padding:0 14px 12px"><div style="font-size:10px;color:#9a7080;letter-spacing:1px;margin-bottom:7px">INSCRIPTAS</div>’;
if(!c.enrolled.length)h+=’<div style="font-size:12px;color:#bbb">Sin alumnas inscriptas</div>’;
c.enrolled.forEach(function(name){var struck=abs.indexOf(name)>=0;h+=’<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(200,180,180,0.1)"><span style=“font-size:13px;color:’+(struck?”#bbb”:”#5a3a4a”)+’;text-decoration:’+(struck?“line-through”:“none”)+’”>’+(struck?”🙋 “:””)+name+’</span><button onclick=“toggleEnroll(’+c.id+’,'’+name.replace(/’/g,”\’”)+’')” style=“background:none;border:none;color:#e57373;cursor:pointer;font-size:13px;padding:2px 6px”>✕</button></div>’;});
h+=’</div></div>’;
});
});
return h;
}

function rAusencias(){
var h=’<div style="font-size:11px;color:#9a7080;letter-spacing:1.5px;margin-bottom:12px;font-weight:bold">🙋 AUSENCIAS</div>’;
if(!absences.length)h+=’<div style="color:#bbb;font-size:13px;text-align:center;padding:28px">No hay ausencias avisadas 🌸</div>’;
absences.forEach(function(a,i){var cls=classes.find(function(c){return c.id==a.classId;});h+=’<div class="row" style="margin-bottom:6px"><div style="flex:1"><span style="font-weight:bold;color:#5a3a4a">’+a.studentName+’</span><span style="color:#aaa;margin-left:8px;font-size:12px">falta a ‘+(cls?cls.day+’ ‘+cls.time+‘hs’:‘clase eliminada’)+’</span></div><button onclick="rmAbsence('+i+')" style="background:none;border:none;color:#e57373;cursor:pointer;font-size:16px">✕</button></div>’;});
return h;
}

function rProfes(){
var colors={Anabella:”#d4a5a5”,Maia:”#a5b4d4”,“Rocío”:”#a5d4b4”,Antonela:”#d4cca5”,Iara:”#c4a5d4”};
var h=’<div style="font-size:11px;color:#9a7080;letter-spacing:1.5px;margin-bottom:12px;font-weight:bold">👩‍🏫 PROFES</div>’;
Object.entries(TEACHERS).forEach(function(e){
var name=e[0],phone=e[1];
var myCls=classes.filter(function(c){return c.teacher===name;});
var days=[];myCls.forEach(function(c){if(days.indexOf(c.day)<0)days.push(c.day);});
var times={};myCls.forEach(function(c){if(!times[c.day])times[c.day]=[];times[c.day].push(c.time);});
h+=’<div class="card" style="margin-bottom:8px;border-left:4px solid '+(colors[name]||'#ccc')+'">’;
h+=’<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">’;
h+=’<div style="font-weight:bold;color:#5a3a4a;font-size:15px">’+name+’</div>’;
h+=’<button onclick="openWA(\''+phone+'\',\'Hola '+name+'! &#127800;\')" class="smb" style="background:#25D366">💬</button></div>’;
h+=’<div style="font-size:12px;color:#9a7080">📱 +’+phone+’</div>’;
if(days.length){
h+=’<div style="font-size:10px;color:#9a7080;font-weight:bold;letter-spacing:1px;margin:8px 0 4px">📅 HORARIOS</div>’;
days.forEach(function(d){h+=’<div style="font-size:12px;color:#7a5a6a">’+d+’: ‘+times[d].join(’, ‘)+‘hs</div>’;});
}
h+=’</div>’;
});
return h;
}
